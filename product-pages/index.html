<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban 1994 | תרמוקיר פלסטומר 603</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #059669; --bg: #020617; }
        body { background-color: var(--bg); color: #e5e7eb; font-family: 'Assistant', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .interactive { position: relative; z-index: 100 !important; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#020617]/80 backdrop-blur-md z-[1000] border-b border-white/5">
        <div class="font-black text-xl tracking-tighter text-emerald-500">SABAN 1994</div>
        <div class="flex gap-4">
            <button class="interactive text-xl"><i class="fas fa-share-nodes"></i></button>
            <button class="interactive text-xl" id="btn-compare"><i class="fas fa-code-compare"></i></button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 space-y-4">
            <div id="main-media" class="aspect-video bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5 flex items-center justify-center">
                <img src="https://www.termokir.co.il/wp-content/uploads/2020/03/Plastomer-603.png" class="max-h-full">
            </div>
            <div class="flex gap-3 overflow-x-auto pb-2" id="thumbs">
                </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl">
                <h1 class="text-3xl font-black mb-2">תרמוקיר פלסטומר 603</h1>
                <p class="text-emerald-500 font-bold text-sm mb-6 uppercase tracking-widest">דבק צמנטי לשימוש כללי</p>
                
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10 space-y-4">
                    <h3 class="text-xs font-bold opacity-50 uppercase">מחשבון כמויות חכם</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] block mb-1">שטח (מ"ר)</label>
                            <input type="number" id="calc-area" value="10" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] block mb-1">עובי (מ"מ)</label>
                            <input type="number" id="calc-thick" value="5" class="w-full bg-slate-800 border-none rounded-xl p-3 text-sm">
                        </div>
                    </div>
                    <div id="calc-result" class="text-emerald-400 font-black text-center py-2 bg-emerald-500/10 rounded-xl">
                        סה"כ נדרש: 4 שקים (25 ק"ג)
                    </div>
                </div>

                <button class="interactive w-full bg-emerald-600 mt-6 py-5 rounded-2xl font-black text-lg hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-600/20">
                    הוסף נדרש להזמנה
                </button>
            </div>
        </div>
    </main>

    <section class="max-w-6xl mx-auto p-6">
        <h2 class="font-bold text-xl mb-6">מוצרים משלימים לעבודה מושלמת</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="bundle-grid">
            </div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 p-4 lg:hidden z-[1000]">
        <button class="interactive w-full bg-emerald-600 py-4 rounded-2xl font-black shadow-2xl">בנה הזמנה</button>
    </div>

    <script src="product-app.js"></script>
</body>
</html>
