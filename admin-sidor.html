<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן | חדר בקרה וסידור</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --text: #f8fafc; }
        .light { --bg: #f8fafc; --card: #ffffff; --text: #020617; }
        body { background-color: var(--bg); color: var(--text); transition: background 0.3s ease; height: 100vh; display: flex; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); z-index: 50; }
        .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.1); }
        button, input { z-index: 100 !important; position: relative; cursor: pointer; }
    </style>
</head>
<body id="admin-body">

    <aside class="w-80 glass p-6 flex flex-col gap-6">
        <div class="flex justify-between items-center">
            <h1 class="font-black text-xl">SABAN CONTROL</h1>
            <button id="theme-toggle" class="p-3 rounded-xl bg-blue-500/20 hover:bg-blue-500/40 transition-all">
                <i id="theme-icon" class="fas fa-sun text-yellow-400"></i>
            </button>
        </div>
        
        <div class="space-y-4">
            <div class="p-4 rounded-2xl bg-blue-500/10 border border-blue-500/20">
                <p class="text-[10px] font-bold opacity-60">שאילתות AI</p>
                <div id="ai-usage" class="text-2xl font-black">0 / 1000</div>
            </div>
            
            <div class="p-4 rounded-2xl border-t-4 border-red-500 glass">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-bold">מצב AI</span>
                    <input type="checkbox" id="ai-switch" checked class="w-10 h-5 cursor-pointer">
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col p-6 gap-4">
        <div id="master-chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 rounded-[2rem] bg-black/20">
            </div>
        
        <div class="flex gap-2 p-2 glass rounded-2xl">
            <input type="text" id="admin-input" placeholder="מענה ידני של רמי..." 
                   class="flex-1 bg-transparent p-3 outline-none border-none text-sm">
            <button id="admin-send" class="bg-blue-600 px-6 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all">
                שלח
            </button>
        </div>
    </main>

    <script type="module" src="admin-logic.js"></script>
</body>
</html>
