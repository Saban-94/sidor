<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rami's Autopilot | Saban AI</title>
    <link rel="icon" href="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble-in { background: #ffffff; border-radius: 0 10px 10px 10px; align-self: flex-start; padding: 8px 12px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble-out { background: #dcf8c6; border-radius: 10px 0 10px 10px; align-self: flex-end; padding: 8px 12px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="w-full flex overflow-hidden">

    <aside class="w-[300px] bg-white border-l flex flex-col shrink-0 shadow-lg">
        <header class="p-4 bg-[#00a884] text-white">
            <h1 class="font-bold text-lg">טייס אוטומטי - ח. סבן</h1>
            <p class="text-xs opacity-80">מחובר לצינור JONI</p>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="flex-1 flex flex-col whatsapp-bg relative">
        <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div id="active-avatar" class="w-10 h-10 rounded-full bg-slate-400 overflow-hidden"></div>
                <div>
                    <span id="active-name" class="font-bold text-sm block">בחר לקוח</span>
                    <span id="active-status" class="text-[10px] text-green-600 font-bold">Autopilot פעיל</span>
                </div>
            </div>
        </header>

        <div id="chat-canvas" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3"></div>

        <footer class="p-3 bg-[#f0f2f5] flex items-center gap-3 shrink-0">
            <input id="msg-input" type="text" placeholder="כתוב הודעה לראמי..." class="flex-1 p-2.5 rounded-lg border-none outline-none text-sm">
            <button id="send-btn" class="bg-[#00a884] text-white w-10 h-10 rounded-full shadow-md"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onChildAdded, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const RAMI_PRIVATE = "+972508861080";

        // 1. האזנה לצינור JONI (מענה אוטומטי)
        onChildAdded(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if (!data) return;

            // הטייס האוטומטי מעבד את ההודעה
            const res = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: data.text, senderPhone: data.from })
            });
            const aiData = await res.json();

            // שליחה חזרה לווטסאפ דרך JONI
            await push(ref(rtdb, 'saban94/send'), {
                to: data.from,
                text: aiData.reply,
                timestamp: Date.now()
            });

            // שמירה בהיסטוריה
            await addDoc(collection(db, "customers", data.from, "chat_history"), {
                text: data.text, type: 'in', timestamp: serverTimestamp()
            });
            await addDoc(collection(db, "customers", data.from, "chat_history"), {
                text: aiData.reply, type: 'out', timestamp: serverTimestamp()
            });
        });

        // 2. רשימת לקוחות
        onSnapshot(collection(db, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const c = d.data();
                list.insertAdjacentHTML('beforeend', `
                    <div onclick="window.loadChat('${d.id}', '${c.name || d.id}')" class="p-4 border-b hover:bg-slate-50 cursor-pointer flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-600 text-white flex items-center justify-center font-bold">${(c.name || 'L')[0]}</div>
                        <div class="text-sm font-bold">${c.name || d.id}</div>
                    </div>`);
            });
        });

        // 3. טעינת צ'אט
        window.loadChat = (phone, name) => {
            document.getElementById('active-name').innerText = name;
            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const style = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="${style}">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };
    </script>
</body>
</html>
