<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban AI Studio | Desktop Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f0f2f5; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        
        .sidebar { width: 350px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; z-index: 50; }
        .chat-area { flex: 1; background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; position: relative; }
        
        #chat-canvas { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .bubble-in { background: white; align-self: flex-start; }
        .bubble-out { background: #dcf8c6; align-self: flex-end; }
        
        /* תיקון לחיצה קריטי */
        footer { background: #f0f2f5; padding: 12px; display: flex; align-items: center; gap: 10px; z-index: 100; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; padding: 10px; border-radius: 8px; border: none; outline: none; font-size: 14px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        #send-btn { cursor: pointer; color: #54656f; font-size: 20px; transition: color 0.2s; }
        #send-btn:hover { color: #00a884; }
    </style>
</head>
<body>

    <aside class="sidebar h-full shadow-lg">
        <header class="p-4 bg-[#f0f2f5] border-b flex justify-between items-center shrink-0">
            <h1 class="font-bold text-slate-700 italic">ח. סבן - ניהול AI</h1>
            <div id="status-pulse" class="w-3 h-3 bg-gray-400 rounded-full" title="סטטוס מערכת"></div>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto bg-white"></div>
    </aside>

    <main class="chat-area flex-1">
        <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center justify-between shadow-sm z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-green-600 flex items-center justify-center text-white font-bold">S</div>
                <div>
                    <span id="active-chat-name" class="font-bold text-sm block">בחר לקוח</span>
                    <span id="ai-indicator" class="text-[10px] text-gray-500 italic">מערכת מחוברת ל-JONI</span>
                </div>
            </div>
        </header>

        <div id="chat-canvas"></div>

        <footer>
            <button class="text-gray-500 text-xl px-2"><i class="far fa-smile"></i></button>
            <input id="msg-input" type="text" placeholder="הקלד הודעה לסידור..." autocomplete="off">
            <button id="send-btn" title="שלח"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onChildAdded, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.app/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        // מלשינון סטטוס
        function setPulse(color) { document.getElementById('status-pulse').className = `w-3 h-3 rounded-full bg-${color}-500`; }

        // האזנה להודעות נכנסות מ-JONI (saban94)
        onChildAdded(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if(!data) return;
            const phone = data.from.toString();

            await setDoc(doc(db, "customers", phone), { lastUpdate: serverTimestamp() }, { merge: true });
            await addDoc(collection(db, "customers", phone, "chat_history"), { text: data.text, type: 'in', timestamp: serverTimestamp() });

            // הפעלת Autopilot
            if (data.time > Date.now() - 60000) {
                setPulse('yellow');
                try {
                    const res = await fetch('/api/gemini', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: data.text, senderPhone: phone })
                    });
                    const ai = await res.json();
                    await push(ref(rtdb, 'saban94/send'), { to: phone, text: ai.reply, timestamp: Date.now() });
                    setPulse('green');
                } catch (e) { setPulse('red'); }
            }
        });

        // רשימת לקוחות
        onSnapshot(query(collection(db, "customers"), orderBy("lastUpdate", "desc")), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = "p-4 border-b hover:bg-gray-100 cursor-pointer transition-all";
                item.innerHTML = `<div class="font-bold text-sm text-gray-700">${d.id === '972508861080' ? 'ראמי (פרטי)' : d.id}</div><div class="text-[10px] text-gray-400">לחץ לצפייה בצ'אט</div>`;
                item.onclick = () => window.loadChat(d.id);
                list.appendChild(item);
            });
        });

        window.loadChat = (phone) => {
            document.getElementById('active-chat-name').innerText = phone;
            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const cls = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="bubble ${cls}">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };

        // שליחה ידנית לחיצה
        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('msg-input');
            const phone = document.getElementById('active-chat-name').innerText;
            if(!input.value.trim() || phone === "בחר לקוח") return;

            await push(ref(rtdb, 'saban94/send'), { to: phone, text: input.value, timestamp: Date.now() });
            input.value = '';
        });
    </script>
</body>
</html>
