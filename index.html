<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Saban AI - Unified Desktop & Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #f0f2f5; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        .sidebar { width: 350px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; z-index: 50; }
        .chat-area { flex: 1; background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; position: relative; }
        #chat-canvas { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 8px; font-size: 14.5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble-in { background: white; align-self: flex-start; }
        .bubble-out { background: #dcf8c6; align-self: flex-end; }
        
        /* Footer לחיץ ב-100% */
        footer { background: #f0f2f5; padding: 10px 15px; display: flex; align-items: center; gap: 12px; z-index: 100; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #eee; outline: none; font-size: 15px; }
        
        /* מלשינון UI */
        #debugger { position: fixed; bottom: 80px; left: 20px; width: 280px; background: rgba(0,0,0,0.9); color: #00ff00; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 8px; z-index: 200; border: 1px solid #333; }
    </style>
</head>
<body>

    <aside class="sidebar shadow-2xl">
        <header class="p-4 bg-[#f0f2f5] border-b flex justify-between items-center">
            <h1 class="font-bold text-slate-700 italic">ח. סבן AI - ניהול</h1>
            <button onclick="toggleDebugger()" class="text-gray-400 hover:text-green-600"><i class="fas fa-terminal"></i></button>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="chat-area">
        <header class="h-[65px] bg-[#f0f2f5] border-b p-3 flex items-center justify-between shadow-sm z-20">
            <div class="flex items-center gap-3">
                <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span id="active-chat-name" class="font-bold text-slate-800">בחר שיחה מהרשימה</span>
            </div>
        </header>

        <div id="chat-canvas"></div>

        <footer>
            <input id="msg-input" type="text" placeholder="הקלד הודעה ללקוח..." autocomplete="off">
            <button id="send-btn" class="text-[#54656f] text-2xl hover:text-green-600 transition-all"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </main>

    <div id="debugger" style="display:none;">
        <div class="border-b border-green-900 pb-1 mb-2 font-bold uppercase text-xs">System Debugger</div>
        <div id="debug-fb">Firebase: Connecting...</div>
        <div id="debug-joni">JONI Pipeline: Active</div>
        <div id="debug-ai">Gemini Status: Idle</div>
        <div id="debug-last" class="mt-2 text-white text-[9px] opacity-70">Last Event: None</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onChildAdded, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const updateDebug = (id, msg, color) => {
            const el = document.getElementById(id);
            if(el) { el.innerText = msg; if(color) el.style.color = color; }
        };

        // האזנה להודעות נכנסות מ-JONI (נתיב יחיד: saban94)
        onChildAdded(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if(!data) return;
            const phone = data.from.toString();
            updateDebug('debug-last', `Input from: ${phone} (${new Date().toLocaleTimeString()})`);

            await setDoc(doc(db, "customers", phone), { lastUpdate: serverTimestamp() }, { merge: true });
            await addDoc(collection(db, "customers", phone, "chat_history"), { text: data.text, type: 'in', timestamp: serverTimestamp() });

            // הפעלת Autopilot במידה וההודעה חדשה
            if (data.time > Date.now() - 60000) {
                updateDebug('debug-ai', 'Gemini: Processing...', 'yellow');
                try {
                    const res = await fetch('/api/gemini', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: data.text, senderPhone: phone })
                    });
                    const ai = await res.json();
                    
                    if(ai.reply) {
                        await push(ref(rtdb, 'saban94/send'), { to: phone, text: ai.reply, timestamp: Date.now() });
                        updateDebug('debug-ai', 'Gemini: Sent Success', '#00ff00');
                    }
                } catch (e) { updateDebug('debug-ai', `Gemini: Error`, 'red'); }
            }
        });

        // רשימת לקוחות וצ'אט
        onSnapshot(query(collection(db, "customers"), orderBy("lastUpdate", "desc")), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = "p-4 border-b hover:bg-gray-100 cursor-pointer transition-all";
                item.innerHTML = `<div class="font-bold text-sm text-gray-700">${d.id === '972508861080' ? 'ראמי הבוס (פרטי)' : d.id}</div>`;
                item.onclick = () => loadChat(d.id);
                list.appendChild(item);
            });
            updateDebug('debug-fb', 'Firebase: Online', '#00ff00');
        });

        window.loadChat = (phone) => {
            document.getElementById('active-chat-name').innerText = `צ'אט עם: ${phone}`;
            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    canvas.insertAdjacentHTML('beforeend', `<div class="bubble ${m.type === 'in' ? 'bubble-in' : 'bubble-out'}">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };

        // שליחה ידנית
        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            const phone = document.getElementById('active-chat-name').innerText.split(': ')[1];
            if(!input.value.trim() || !phone) return;

            await push(ref(rtdb, 'saban94/send'), { to: phone, text: input.value, timestamp: Date.now() });
            input.value = '';
        };

        window.toggleDebugger = () => {
            const d = document.getElementById('debugger');
            d.style.display = d.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>
</html>
