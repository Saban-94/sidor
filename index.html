<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן - ניהול סידור עבודה חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-20 font-sans text-right">

    <header class="bg-blue-900 text-white p-6 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic">H.SABAN 1994</h1>
                <p class="text-xs opacity-80 font-bold">מערכת ניהול סידור עבודה ובוט לוגיסטי</p>
            </div>
            <i class="fas fa-truck-loading text-3xl text-yellow-400"></i>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div class="bg-white rounded-3xl shadow-lg p-6 border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-6 border-b pb-2 flex items-center gap-2">
                <i class="fas fa-plus-circle text-blue-600"></i> הזנה לסידור היומי
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="time" type="time" value="07:00" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="client" type="text" placeholder="שם לקוח" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="address" type="text" placeholder="כתובת / אתר" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <select id="deliveryType" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <option>הובלת משאית</option>
                    <option>הובלת מנוף</option>
                    <option>משיכה עצמית</option>
                    <option>איסוף בלות פסולת</option>
                </select>
                <select id="driver" class="p-3 bg-slate-50 border rounded-xl font-bold text-blue-900">
                    <option value="עלי">עלי (משאית) 🚚</option>
                    <option value="חכמת">חכמת (מנוף) 🏗️</option>
                </select>
                <button id="addBtn" class="bg-blue-600 hover:bg-blue-800 text-white font-black py-3 rounded-xl shadow-md transition-all">הוסף ללוח</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div class="bg-blue-600 text-white p-3 rounded-t-2xl font-bold flex justify-between items-center shadow-md">
                    <span>🚚 עלי</span>
                    <span id="count-ali" class="bg-blue-800 px-2 py-0.5 rounded text-xs">0 משימות</span>
                </div>
                <div id="list-ali" class="space-y-3 bg-white p-4 rounded-b-2xl shadow-sm border border-slate-200 min-h-[150px]"></div>
            </div>

            <div class="space-y-4">
                <div class="bg-emerald-600 text-white p-3 rounded-t-2xl font-bold flex justify-between items-center shadow-md">
                    <span>🏗️ חכמת</span>
                    <span id="count-hachmat" class="bg-emerald-800 px-2 py-0.5 rounded text-xs">0 משימות</span>
                </div>
                <div id="list-hachmat" class="space-y-3 bg-white p-4 rounded-b-2xl shadow-sm border border-slate-200 min-h-[150px]"></div>
            </div>
        </div>

        <button id="sendTotalBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-black text-xl py-5 rounded-2xl shadow-2xl flex items-center justify-center gap-3 transition-all transform active:scale-95 mt-10">
            <i class="fab fa-whatsapp text-2xl"></i> שלח סידור סופי לקבוצה 🚀
        </button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1",
            storageBucket: "whatsapp-8ffd1.firebasestorage.app",
            messagingSenderId: "248003330797",
            appId: "1:248003330797:web:db93f4c5b223bfa647c2e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let sidor = JSON.parse(localStorage.getItem('saban_sidor_db')) || [];

        function render() {
            const aliList = document.getElementById('list-ali');
            const hachmatList = document.getElementById('list-hachmat');
            aliList.innerHTML = '';
            hachmatList.innerHTML = '';

            let counts = { עלי: 0, חכמת: 0 };

            sidor.sort((a,b) => a.time.localeCompare(b.time)).forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "p-3 bg-slate-50 rounded-xl border-r-4 " + (item.driver === 'עלי' ? 'border-blue-500' : 'border-emerald-500') + " flex justify-between items-center shadow-sm";
                card.innerHTML = `
                    <div class="text-sm">
                        <span class="font-black text-slate-800">${item.time}</span> | 
                        <span class="text-slate-600">${item.client}</span><br>
                        <span class="text-[10px] text-slate-400">${item.address}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editItem(${index})" class="text-blue-400 hover:text-blue-600 p-1"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteItem(${index})" class="text-red-300 hover:text-red-600 p-1"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                if(item.driver === 'עלי') { aliList.appendChild(card); counts.עלי++; }
                else { hachmatList.appendChild(card); counts.חכמת++; }
            });

            document.getElementById('count-ali').innerText = `${counts.עלי} משימות`;
            document.getElementById('count-hachmat').innerText = `${counts.חכמת} משימות`;
            localStorage.setItem('saban_sidor_db', JSON.stringify(sidor));
        }

        document.getElementById('addBtn').onclick = () => {
            const client = document.getElementById('client').value;
            if(!client) return alert("הכנס שם לקוח");
            
            sidor.push({
                time: document.getElementById('time').value,
                client: client,
                address: document.getElementById('address').value,
                delivery: document.getElementById('deliveryType').value,
                driver: document.getElementById('driver').value
            });
            clearForm();
            render();
        };

        window.deleteItem = (i) => { if(confirm("למחוק הזמנה?")) { sidor.splice(i, 1); render(); } };

        window.editItem = (i) => {
            const item = sidor[i];
            document.getElementById('time').value = item.time;
            document.getElementById('client').value = item.client;
            document.getElementById('address').value = item.address;
            document.getElementById('deliveryType').value = item.delivery;
            document.getElementById('driver').value = item.driver;
            sidor.splice(i, 1);
            render();
        };

        function clearForm() {
            document.getElementById('client').value = '';
            document.getElementById('address').value = '';
        }

        document.getElementById('sendTotalBtn').onclick = async () => {
            if(sidor.length === 0) return alert("הסידור ריק");
            let report = `*📋 סידור סופי - ח. סבן 1994 בע"מ*\n\n`;
            
            ['עלי', 'חכמת'].forEach(d => {
                const tasks = sidor.filter(o => o.driver === d);
                if(tasks.length > 0) {
                    report += `*${d === 'עלי' ? '🚚 עלי' : '🏗️ חכמת'}:*\n`;
                    tasks.forEach(o => report += `• ${o.time}: ${o.client} (${o.address})\n`);
                    report += `\n`;
                }
            });

            try {
                await push(ref(db, 'saban94/send'), { to: "972508860896", text: report });
                alert("סידור נשלח לקבוצה! ✅");
            } catch (e) { alert("שגיאה בשליחה"); }
        };

        render();
    </script>
</body>
</html>
