<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן - ניהול סידור יומי</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto p-4 space-y-6">
        <header class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center">
            <h1 class="text-2xl font-bold">🏗️ ניהול סידור עבודה - ח. סבן</h1>
            <p class="opacity-80">שיבוץ נהגים ושליחה לקבוצה</p>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-yellow-500">
            <h2 class="font-bold text-lg mb-4">➕ הוספת הזמנה חדשה</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input id="newTime" type="time" class="p-3 border rounded-xl bg-gray-50" value="07:00">
                <input id="newClient" type="text" placeholder="לקוח ומיקום" class="p-3 border rounded-xl bg-gray-50">
                <select id="newDriver" class="p-3 border rounded-xl bg-gray-50 font-bold text-blue-800">
                    <option value="עלי">עלי 🚚</option>
                    <option value="חכמת">חכמת 🏗️</option>
                </select>
                <button id="addOrderBtn" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">הוסף ללוח</button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-md">
                <h3 class="text-center font-bold text-xl text-blue-700 border-b pb-2 mb-4">עמודת עלי 🚚</h3>
                <div id="ali-list" class="space-y-3 min-h-[100px]"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-md">
                <h3 class="text-center font-bold text-xl text-green-700 border-b pb-2 mb-4">עמודת חכמת 🏗️</h3>
                <div id="hachmat-list" class="space-y-3 min-h-[100px]"></div>
            </div>
        </div>

        <div class="text-center pb-10">
            <button id="sendToGroupBtn" class="bg-green-600 hover:bg-green-700 text-white text-xl font-extrabold py-5 px-10 rounded-2xl shadow-2xl transition-all transform hover:scale-105 w-full">
                📤 שלח סידור סופי לקבוצת הווטסאפ
            </button>
            <button onclick="clearSidor()" class="mt-4 text-red-500 text-sm underline">איפוס סידור יומי</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1",
            storageBucket: "whatsapp-8ffd1.firebasestorage.app",
            messagingSenderId: "248003330797",
            appId: "1:248003330797:web:db93f4c5b223bfa647c2e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let orders = JSON.parse(localStorage.getItem('saban_sidor')) || [];

        function renderOrders() {
            const aliList = document.getElementById('ali-list');
            const hachmatList = document.getElementById('hachmat-list');
            aliList.innerHTML = '';
            hachmatList.innerHTML = '';

            orders.sort((a, b) => a.time.localeCompare(b.time)).forEach((order, index) => {
                const item = document.createElement('div');
                item.className = "p-3 bg-gray-50 border-r-4 border-blue-500 rounded shadow-sm flex justify-between items-center";
                item.innerHTML = `<div><span class="font-bold">${order.time}</span> | ${order.client}</div>`;
                
                if (order.driver === 'עלי') aliList.appendChild(item);
                else hachmatList.appendChild(item);
            });
            localStorage.setItem('saban_sidor', JSON.stringify(orders));
        }

        document.getElementById('addOrderBtn').onclick = () => {
            const client = document.getElementById('newClient').value;
            if (!client) return alert("רמי, הכנס שם לקוח");
            
            orders.push({
                time: document.getElementById('newTime').value,
                client: client,
                driver: document.getElementById('newDriver').value
            });
            document.getElementById('newClient').value = '';
            renderOrders();
        };

        window.clearSidor = () => {
            if(confirm("למחוק את כל הסידור?")) {
                orders = [];
                renderOrders();
            }
        };

        document.getElementById('sendToGroupBtn').onclick = async () => {
            if (orders.length === 0) return alert("הסידור ריק");

            let report = `*📋 סידור עבודה סופי - ח. סבן 1994 בע"מ*\n\n`;
            
            const aliOrders = orders.filter(o => o.driver === 'עלי');
            const hachmatOrders = orders.filter(o => o.driver === 'חכמת');

            if (aliOrders.length > 0) {
                report += `*🚚 עמודת עלי:*\n`;
                aliOrders.forEach(o => report += `• ${o.time}: ${o.client}\n`);
            }

            if (hachmatOrders.length > 0) {
                report += `\n*🏗️ עמודת חכמת:*\n`;
                hachmatOrders.forEach(o => report += `• ${o.time}: ${o.client}\n`);
            }

            report += `\n_נא לאשר קבלת הסידור. סעו בזהירות!_ 🚛`;

            try {
                // שליחה לקבוצת דוח בוקר (יש להזין כאן את ה-Group ID או מספר היעד של הקבוצה ב-JONI)
                const msgRef = ref(db, 'saban94/send');
                await push(msgRef, {
                    to: "972508860896", // כאן תשים את ה-ID של הקבוצה או מספר מנהל לצורך בדיקה
                    text: report
                });
                alert("הסידור המרוכז נשלח בהצלחה ל-JONI! ✅");
            } catch (e) {
                alert("שגיאה בשליחה ל-Firebase");
            }
        };

        renderOrders();
    </script>
</body>
</html>
