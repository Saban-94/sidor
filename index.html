<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban AI Enterprise | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; display: flex; }
        
        /* WhatsApp Desktop Layout */
        .sidebar { width: 30%; max-width: 400px; min-width: 300px; background: #ffffff; border-left: 1px solid #d1d7db; display: flex; flex-col; }
        .main-chat { flex: 1; background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; }
        
        .chat-bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 14.5px; line-height: 1.4; box-shadow: 0 1px 0.5px rgba(0,0,0,0.1); }
        .bubble-in { background: #ffffff; align-self: flex-start; border-top-right-radius: 0; }
        .bubble-out { background: #dcf8c6; align-self: flex-end; border-top-left-radius: 0; }
        
        /* מלשינון UI */
        #debug-panel { position: fixed; bottom: 80px; left: 20px; width: 250px; background: rgba(0,0,0,0.85); color: #00ff00; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 5px; z-index: 100; display: none; }
    </style>
</head>
<body>

    <aside class="sidebar h-full shadow-2xl z-10">
        <header class="h-[60px] bg-[#f0f2f5] p-3 flex items-center justify-between border-b border-gray-200">
            <div class="flex items-center gap-3">
                <img src="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111" class="w-10 h-10 rounded-full border border-gray-300">
                <span class="font-bold text-gray-700">ח. סבן AI</span>
            </div>
            <button onclick="toggleDebug()" class="text-gray-500 hover:text-red-500 transition-colors"><i class="fas fa-bug"></i></button>
        </header>

        <div id="customer-list" class="flex-1 overflow-y-auto bg-white">
            </div>
    </aside>

    <main class="main-chat relative">
        <header class="h-[60px] bg-[#f0f2f5] border-b border-gray-200 p-3 flex items-center justify-between z-10 shadow-sm">
            <div class="flex items-center gap-3">
                <div id="active-avatar" class="w-10 h-10 rounded-full bg-slate-400 flex items-center justify-center text-white font-bold">?</div>
                <div>
                    <h2 id="active-name" class="font-bold text-sm text-slate-800">בחר שיחה</h2>
                    <p id="ai-indicator" class="text-[10px] text-gray-500 italic">מערכת בניטור...</p>
                </div>
            </div>
        </header>

        <div id="chat-canvas" class="flex-1 p-8 overflow-y-auto flex flex-col gap-2">
            <div class="self-center bg-[#d9fdd3] text-[#54656f] text-[12px] px-4 py-2 rounded-lg shadow-sm mb-4">
                <i class="fas fa-lock text-[10px] ml-1"></i> המערכת מחוברת ל-Gemini Autopilot
            </div>
        </div>

        <footer class="h-[62px] bg-[#f0f2f5] p-2.5 flex items-center gap-2">
            <button class="text-gray-500 px-3"><i class="far fa-smile text-xl"></i></button>
            <input id="msg-input" type="text" placeholder="הקלד הודעה..." class="flex-1 bg-white p-2.5 rounded-lg outline-none text-sm shadow-sm border border-gray-100">
            <button id="send-btn" class="text-[#54656f] px-3 hover:text-green-600 transition-all"><i class="fas fa-paper-plane text-xl"></i></button>
        </footer>
    </main>

    <div id="debug-panel">
        <div>[SYSTEM MONITOR]</div>
        <div id="log-firebase">Firebase: Connecting...</div>
        <div id="log-gemini">Gemini: Waiting...</div>
        <div id="log-last-path">Path: None</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onChildAdded, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const debugLog = (id, msg, color) => {
            const el = document.getElementById(id);
            if(el) { el.innerText = msg; el.style.color = color || "#00ff00"; }
        };

        // 1. האזנה ל-JONI (מלשינון מובנה על הצינור)
        onChildAdded(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if(!data) return;
            const phone = data.from.toString();
            debugLog('log-last-path', `Last Input: ${phone}`, "white");

            // עדכון Firestore (כרטיס לקוח והיסטוריה)
            await setDoc(doc(db, "customers", phone), { lastUpdate: serverTimestamp() }, { merge: true });
            await addDoc(collection(db, "customers", phone, "chat_history"), {
                text: data.text, type: 'in', timestamp: serverTimestamp()
            });

            // הפעלת ה-AI
            if (data.time > Date.now() - 60000) {
                processAI(data.text, phone);
            }
        });

        async function processAI(text, phone) {
            debugLog('log-gemini', "Gemini: Processing...", "yellow");
            try {
                const res = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, senderPhone: phone })
                });
                const aiData = await res.json();
                
                if (aiData.reply) {
                    await push(ref(rtdb, 'saban94/send'), {
                        to: phone, text: aiData.reply, timestamp: Date.now()
                    });
                    debugLog('log-gemini', "Gemini: Replied OK", "#00ff00");
                } else {
                    throw new Error("No Reply Body");
                }
            } catch (e) {
                debugLog('log-gemini', `Gemini Error: ${e.message}`, "red");
            }
        }

        // 2. רשימת לקוחות Desktop Style
        onSnapshot(query(collection(db, "customers"), orderBy("lastUpdate", "desc")), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const card = document.createElement('div');
                card.className = "flex items-center gap-3 p-4 border-b border-gray-50 hover:bg-gray-100 cursor-pointer transition-all";
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center text-gray-500 font-bold">
                        ${d.id.slice(-2)}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold text-sm text-slate-800">${d.id === '972508861080' ? 'ראמי (פרטי)' : d.id}</div>
                        <div class="text-xs text-gray-500 truncate">לחץ לצפייה בצ'אט</div>
                    </div>
                `;
                card.onclick = () => loadChat(d.id);
                list.appendChild(card);
            });
            debugLog('log-firebase', "Firebase: Connected", "#00ff00");
        });

        function loadChat(phone) {
            document.getElementById('active-name').innerText = phone;
            document.getElementById('active-avatar').innerText = phone.slice(-1);
            
            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const cls = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="chat-bubble ${cls}">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        }

        // כפתור שליחה ידני
        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            const phone = document.getElementById('active-name').innerText;
            if(!input.value.trim() || phone === "בחר שיחה") return;

            await push(ref(rtdb, 'saban94/send'), {
                to: phone, text: input.value, timestamp: Date.now()
            });
            input.value = '';
        };

        window.toggleDebug = () => {
            const p = document.getElementById('debug-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        };

    </script>
</body>
</html>
