<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban AI Studio | Rami Msarwh</title>
    
    <link rel="icon" type="image/jpeg" href="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111">

    <link rel="manifest" href='data:application/json,{"name":"Saban AI Studio","short_name":"Saban AI","display":"standalone","start_url":"/index.html"}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble-in { background: #ffffff; border-radius: 0 10px 10px 10px; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); max-width: 85%; padding: 8px 12px; }
        .bubble-out { background: #dcf8c6; border-radius: 10px 0 10px 10px; align-self: flex-end; box-shadow: 0 1px 1px rgba(0,0,0,0.1); max-width: 85%; padding: 8px 12px; }
    </style>
</head>
<body class="w-full h-full flex overflow-hidden">

    <aside class="w-[65px] bg-[#eae6df] border-l flex flex-col items-center py-6 gap-8 text-[#54656f] shrink-0">
        <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-md cursor-pointer" onclick="window.loadChat('+972508860896', 'ראמי מסארוה', 'https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111')">
            <img src="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111">
        </div>
        <button title="הזרקת CSV" onclick="document.getElementById('csv-upload').click()"><i class="fas fa-file-import text-2xl hover:text-green-600"></i></button>
        <input type="file" id="csv-upload" class="hidden" accept=".csv">
    </aside>

    <aside class="w-[350px] bg-white border-l flex flex-col shrink-0 shadow-lg">
        <header class="p-4 bg-[#f0f2f5] border-b">
            <h1 class="font-bold text-xl text-slate-800">הזמנות ח. סבן</h1>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full overflow-hidden">
        <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div id="header-avatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold overflow-hidden text-sm">R</div>
                <div>
                    <span id="active-name" class="font-bold text-sm block">בחר לקוח</span>
                    <span id="active-status" class="text-[10px] text-green-600 italic italic font-bold">המוח מחובר</span>
                </div>
            </div>
        </header>

        <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-6 flex flex-col gap-3"></div>

        <footer class="p-3 bg-[#f0f2f5] flex items-center gap-3 shrink-0">
            <input id="msg-input" type="text" placeholder="כתוב הודעה לראמי הפרטי..." class="flex-1 p-2.5 rounded-lg border-none outline-none text-sm shadow-sm">
            <button id="send-btn" class="bg-[#00a884] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // פונקציית עזר לתיקון תאריך (CSV D.M.YYYY)
        function parseSabanDate(d, t) {
            try {
                const p = d.trim().split('.');
                const iso = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}T${t.trim()}`;
                const dt = new Date(iso);
                return isNaN(dt.getTime()) ? null : dt;
            } catch(e) { return null; }
        }

        // הזרקה מה-CSV
        document.getElementById('csv-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const lines = event.target.result.split('\n').slice(1);
                for (let line of lines) {
                    const row = line.split(',');
                    if (row.length < 4) continue;
                    const [date, time, sender, text] = row;
                    const ts = parseSabanDate(date, time);
                    if (!ts) continue;

                    const phoneMatch = text.match(/\+972\d+/);
                    const phone = phoneMatch ? phoneMatch[0] : (sender.includes("ראמי") ? "+972508860896" : "General");
                    const clientName = text.match(/👤\s*([^📱\n]+)/)?.[1]?.trim() || "לקוח";

                    await setDoc(doc(db, "customers", phone), { name: clientName, lastUpdate: ts }, { merge: true });
                    await addDoc(collection(db, "customers", phone, "chat_history"), {
                        text: text.replace(/^"|"$/g, '').trim(),
                        type: sender.includes("הזמנות ח. סבן") ? 'in' : 'out',
                        timestamp: Timestamp.fromDate(ts)
                    });
                }
                alert("ההיסטוריה הוזרקה!");
            };
            reader.readAsText(file);
        };

        // הצגת רשימת לקוחות
        onSnapshot(collection(db, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const c = d.data();
                list.insertAdjacentHTML('beforeend', `
                    <div onclick="window.loadChat('${d.id}', '${c.name || d.id}', '${c.photo || ''}')" 
                         class="p-4 border-b hover:bg-slate-50 cursor-pointer flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full overflow-hidden bg-green-600 text-white flex items-center justify-center font-bold">
                            ${c.photo ? `<img src="${c.photo}">` : (c.name ? c.name[0] : '?')}
                        </div>
                        <div class="flex-1 overflow-hidden font-bold text-sm text-slate-800">${c.name || d.id}</div>
                    </div>`);
            });
        });

        // טעינת צ'אט
        window.loadChat = (phone, name, photo) => {
            document.getElementById('active-name').innerText = name;
            const avatar = document.getElementById('header-avatar');
            avatar.innerHTML = photo ? `<img src="${photo}">` : name[0];

            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const style = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="${style} mb-1">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };

        // שליחה דרך המוח המשולב
        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            const userMsg = input.value.trim();
            if (!userMsg) return;

            document.getElementById('active-status').innerText = "המוח מחשב...";
            
            try {
                const res = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMsg })
                });
                const data = await res.json();
                
                document.getElementById('active-status').innerText = `מחובר דרך: ${data.modelUsed}`;

                await addDoc(collection(db, "customers", "+972508860896", "chat_history"), {
                    text: `[${data.modelUsed}]: ${data.reply}`,
                    type: 'out',
                    timestamp: serverTimestamp()
                });
                input.value = '';
            } catch (err) {
                document.getElementById('active-status').innerText = "שגיאת צינור!";
            }
        };
    </script>
</body>
</html>
