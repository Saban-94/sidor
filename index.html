<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן - שליחת דוח בוקר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-md mx-auto space-y-4">
        <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-xl text-center border-b-4 border-yellow-500">
            <h1 class="text-2xl font-bold">📋 יצירת דוח בוקר - ח. סבן</h1>
            <p class="text-sm opacity-80">מערכת הפצה אוטומטית לנהגים</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-md border border-gray-200">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">📦 פרטי משימה להיום</h2>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mr-1">בחר נהג</label>
                    <select id="driverSelect" class="w-full p-3 border rounded-xl bg-gray-50 font-bold">
                        <option value="עלי">עלי</option>
                        <option value="חכמת">חכמת</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-500 mr-1">שם הלקוח / אתר</label>
                    <input id="client" type="text" placeholder="למשל: זבולון-עדירן / שיין" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mr-1">יעד (עיר)</label>
                        <input id="location" type="text" placeholder="רעננה" class="w-full p-3 border rounded-xl bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mr-1">כמות בלות (מקסימום 18)</label>
                        <input id="bales" type="number" value="1" max="18" class="w-full p-3 border rounded-xl bg-gray-50">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-gray-500 mr-1">שעת התחלה</label>
                    <input id="startTime" type="time" value="07:00" class="w-full p-3 border rounded-xl bg-gray-50">
                </div>
            </div>

            <button id="sendReportBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-800 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                🚀 שלח דוח לנהג עכשיו
            </button>
        </div>

        <div id="statusMsg" class="text-center text-sm font-medium text-green-600 hidden">
            הדוח הועבר ל-JONI בהצלחה! ✅
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1",
            storageBucket: "whatsapp-8ffd1.firebasestorage.app",
            messagingSenderId: "248003330797",
            appId: "1:248003330797:web:db93f4c5b223bfa647c2e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // מספרי הטלפון של הנהגים
        const driversPhones = {
            "עלי": "972508860896", // מספר הנהג עלי
            "חכמת": "972502120038" // מספר הנהג חכמת
        };

        async function sendMorningReport() {
            const driver = document.getElementById('driverSelect').value;
            const client = document.getElementById('client').value;
            const location = document.getElementById('location').value;
            const bales = document.getElementById('bales').value;
            const time = document.getElementById('startTime').value;
            const btn = document.getElementById('sendReportBtn');

            if(!client || !location) {
                alert("רמי, נא למלא את כל הפרטים לפני השליחה");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "מעבד...";

            // בניית הודעה מקצועית
            const message = `*📋 דוח בוקר - ח. סבן 1994 בע"מ*\n\n` +
                          `👤 *נהג:* ${driver}\n` +
                          `⏰ *שעת יציאה:* ${time}\n` +
                          `📍 *יעד:* ${location}\n` +
                          `🏗️ *לקוח:* ${client}\n` +
                          `📦 *כמות בלות:* ${bales}/18\n\n` +
                          `_נא לאשר קבלת סידור זה. סע בזהירות!_ 🚛`;

            try {
                const msgRef = ref(db, 'saban94/send');
                await push(msgRef, {
                    to: driversPhones[driver],
                    text: message
                });

                document.getElementById('statusMsg').classList.remove('hidden');
                setTimeout(() => document.getElementById('statusMsg').classList.add('hidden'), 3000);
            } catch (e) {
                alert("שגיאה בשליחה: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "🚀 שלח דוח לנהג עכשיו";
            }
        }

        document.getElementById('sendReportBtn').addEventListener('click', sendMorningReport);
    </script>
</body>
</html>
