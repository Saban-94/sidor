<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Saban AI - ממשק עסקי לחיץ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; background: #f0f2f5; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        .sidebar { width: 350px; background: white; border-left: 1px solid #ddd; z-index: 10; display: flex; flex-direction: column; }
        .chat-main { flex: 1; background: #e5ddd5; display: flex; flex-direction: column; position: relative; z-index: 5; }
        
        /* תיקון לחיצה - וידוא שאין שכבה חוסמת */
        footer { 
            background: #f0f2f5; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            z-index: 1000 !important; /* שכבה עליונה ביותר */
            border-top: 1px solid #ddd;
        }
        #msg-input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            outline: none; 
            background: white !important;
            cursor: text !important;
            pointer-events: auto !important;
            z-index: 1100 !important;
        }
        #send-btn { 
            cursor: pointer !important; 
            z-index: 1100 !important;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <aside class="sidebar shadow-lg">
        <header class="p-4 bg-slate-100 border-b font-bold italic text-slate-700">ח. סבן - ניהול סידור</header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="chat-main">
        <header class="h-[60px] bg-white border-b p-3 flex items-center justify-between shadow-sm z-20">
            <span id="active-name" class="font-bold text-gray-700">972508860896 (עסקי)</span>
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
        </header>

        <div id="chat-canvas" class="flex-1 overflow-y-auto p-5 flex flex-col gap-2"></div>

        <footer>
            <input id="msg-input" type="text" placeholder="הקלד כאן ולחץ Enter..." autocomplete="off">
            <button id="send-btn">שלח</button>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);

        async function doSend() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            // שליחה לצינור saban94 (נתיב JONI)
            await push(ref(rtdb, 'saban94/send'), {
                to: "972508861080", // שולח אליך לפרטי לבדיקה
                text: text,
                timestamp: Date.now()
            });

            input.value = '';
            input.focus();
        }

        // מאזין למקלדת ולכפתור
        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') doSend();
        });
        document.getElementById('send-btn').onclick = doSend;

        // טעינת היסטוריה פשוטה
        onValue(ref(rtdb, 'saban94/incoming'), (snap) => {
            const canvas = document.getElementById('chat-canvas');
            canvas.innerHTML = '';
            if(snap.exists()) {
                Object.values(snap.val()).forEach(m => {
                    canvas.insertAdjacentHTML('beforeend', `<div class="bg-white p-2 rounded shadow-sm self-start max-w-[80%]">${m.text}</div>`);
                });
            }
            canvas.scrollTop = canvas.scrollHeight;
        });
    </script>
</body>
</html>
