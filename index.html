<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban AI | Autopilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; margin-bottom: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble-in { background: white; align-self: flex-start; }
        .bubble-out { background: #dcf8c6; align-self: flex-end; }
    </style>
</head>
<body class="w-full">

    <aside class="w-[300px] bg-white border-l flex flex-col shrink-0 shadow-lg">
        <header class="p-4 bg-[#f0f2f5] border-b flex justify-between items-center">
            <h1 class="font-bold text-lg">ח. סבן AI</h1>
            <div id="ai-status" class="w-3 h-3 bg-gray-400 rounded-full" title="סטטוס מוח"></div>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-green-600 flex items-center justify-center text-white font-bold">S</div>
            <span id="active-chat-name" class="font-bold">בחר לקוח מהרשימה</span>
        </header>

        <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-6 flex flex-col"></div>

        <footer class="p-3 bg-[#f0f2f5] flex gap-2">
            <input id="msg-input" type="text" placeholder="שלח הודעה ידנית..." class="flex-1 p-2 rounded-lg outline-none">
            <button id="send-btn" class="bg-[#00a884] text-white px-4 rounded-lg"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onChildAdded, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        // האזנה ל-JONI
        onChildAdded(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if (!data) return;
            const phone = data.from.toString();

            // 1. עדכון Firestore
            await setDoc(doc(db, "customers", phone), { lastUpdate: serverTimestamp() }, { merge: true });
            await addDoc(collection(db, "customers", phone, "chat_history"), { text: data.text, type: 'in', timestamp: serverTimestamp() });

            // 2. הפעלת המוח (Autopilot)
            updateStatus('loading');
            try {
                const res = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: data.text, senderPhone: phone })
                });
                const ai = await res.json();

                // 3. שליחה חזרה לווטסאפ
                await push(ref(rtdb, 'saban94/send'), { to: phone, text: ai.reply, timestamp: Date.now() });
                updateStatus('online');
            } catch (e) {
                updateStatus('offline');
            }
        });

        function updateStatus(s) {
            const el = document.getElementById('ai-status');
            if(s === 'loading') el.className = "w-3 h-3 bg-yellow-500 animate-pulse rounded-full";
            else if(s === 'online') el.className = "w-3 h-3 bg-green-500 rounded-full";
            else el.className = "w-3 h-3 bg-red-500 rounded-full";
        }

        // טעינת רשימת לקוחות
        onSnapshot(query(collection(db, "customers"), orderBy("lastUpdate", "desc")), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                list.insertAdjacentHTML('beforeend', `<div onclick="window.loadChat('${d.id}')" class="p-4 border-b hover:bg-gray-100 cursor-pointer font-bold">${d.id}</div>`);
            });
        });

        window.loadChat = (phone) => {
            document.getElementById('active-chat-name').innerText = phone;
            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const cls = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="bubble ${cls}">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };
    </script>
</body>
</html>
