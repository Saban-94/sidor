<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן - Dashboard סידור עבודה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tight">H.SABAN 1994 <span class="text-yellow-400">LOGISTICS</span></h1>
            <div id="status-indicator" class="flex items-center gap-2 text-xs bg-blue-800 px-3 py-1 rounded-full">
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                מחובר ל-Firebase
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 space-y-6">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-blue-600"></i> הוספת משימה לסידור
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input id="newTime" type="time" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" value="07:00">
                <input id="newClient" type="text" placeholder="לקוח וכתובת פריקה" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <select id="newDriver" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="עלי">עלי - משאית 🚚</option>
                    <option value="חכמת">חכמת - מנוף 🏗️</option>
                </select>
                <button id="addBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                    הוסף ללוח
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div class="bg-blue-600 text-white p-3 rounded-t-xl font-bold flex justify-between items-center">
                    <span>עלי 🚚</span>
                    <span id="count-ali" class="bg-blue-800 px-2 py-0.5 rounded text-xs">0 משימות</span>
                </div>
                <div id="list-ali" class="space-y-3 bg-white p-4 rounded-b-xl shadow-sm border border-slate-200 min-h-[150px]"></div>
            </div>

            <div class="space-y-4">
                <div class="bg-emerald-600 text-white p-3 rounded-t-xl font-bold flex justify-between items-center">
                    <span>חכמת 🏗️</span>
                    <span id="count-hachmat" class="bg-emerald-800 px-2 py-0.5 rounded text-xs">0 משימות</span>
                </div>
                <div id="list-hachmat" class="space-y-3 bg-white p-4 rounded-b-xl shadow-sm border border-slate-200 min-h-[150px]"></div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-4">
        <button id="sendReport" class="w-full bg-gradient-to-r from-green-600 to-emerald-500 hover:from-green-700 hover:to-emerald-600 text-white font-black text-xl py-5 rounded-2xl shadow-2xl shadow-green-200 flex items-center justify-center gap-3 transition-all transform active:scale-95">
            <i class="fab fa-whatsapp text-2xl"></i>
            שלח דוח בוקר ישיר 🚀
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1",
            storageBucket: "whatsapp-8ffd1.firebasestorage.app",
            messagingSenderId: "248003330797",
            appId: "1:248003330797:web:db93f4c5b223bfa647c2e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let sidor = JSON.parse(localStorage.getItem('saban_db')) || [];

        function updateUI() {
            const aliList = document.getElementById('list-ali');
            const hachmatList = document.getElementById('list-hachmat');
            aliList.innerHTML = '';
            hachmatList.innerHTML = '';

            let aliCount = 0, hachmatCount = 0;

            sidor.sort((a,b) => a.time.localeCompare(b.time)).forEach((item, index) => {
                const card = `
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border-r-4 ${item.driver === 'עלי' ? 'border-blue-500' : 'border-emerald-500'}">
                        <div class="text-sm">
                            <span class="font-black text-slate-700">${item.time}</span> | 
                            <span class="text-slate-600 font-medium">${item.client}</span>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                if(item.driver === 'עלי') {
                    aliList.innerHTML += card;
                    aliCount++;
                } else {
                    hachmatList.innerHTML += card;
                    hachmatCount++;
                }
            });

            document.getElementById('count-ali').innerText = `${aliCount} משימות`;
            document.getElementById('count-hachmat').innerText = `${hachmatCount} משימות`;
            localStorage.setItem('saban_db', JSON.stringify(sidor));
        }

        document.getElementById('addBtn').onclick = () => {
            const client = document.getElementById('newClient').value;
            if(!client) return;
            sidor.push({
                time: document.getElementById('newTime').value,
                client: client,
                driver: document.getElementById('newDriver').value
            });
            document.getElementById('newClient').value = '';
            updateUI();
        };

        window.removeItem = (index) => {
            sidor.splice(index, 1);
            updateUI();
        };

        document.getElementById('sendReport').onclick = async () => {
            if(sidor.length === 0) return alert("רמי, הסידור ריק!");

            const today = new Date().toLocaleDateString('he-IL');
            let report = `*📋 דוח בוקר - ח. סבן 1994 בע"מ*\n*תאריך:* ${today}\n\n`;

            const ali = sidor.filter(o => o.driver === 'עלי');
            const hachmat = sidor.filter(o => o.driver === 'חכמת');

            if(ali.length > 0) {
                report += `*🚚 עלי (מנוף):*\n`;
                ali.forEach(o => report += `• ${o.time} - ${o.client}\n`);
            }

            if(hachmat.length > 0) {
                report += `\n*🏗️ חכמת (מנוף):*\n`;
                hachmat.forEach(o => report += `• ${o.time} - ${o.client}\n`);
            }

            report += `\n_הדוח הופק אוטומטית ממערכת SABAN-LOGIC_ 🚀`;

            try {
                // שליחה ישירה ל-Firebase שבו JONI מאזין
                await push(ref(db, 'saban94/send'), {
                    to: "972508860896", // מספר קבוצת דוח בוקר או מספר מנהל
                    text: report
                });
                alert("הדוח נשלח ישירות לווטסאפ דרך השרת! ✅");
            } catch (e) {
                alert("שגיאה בשליחה: " + e.message);
            }
        };

        updateUI();
    </script>
</body>
</html>
