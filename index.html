<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן - מערכת סידור עבודה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-10 font-sans">

    <header class="bg-blue-900 text-white p-6 shadow-2xl border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black">H.SABAN 1994</h1>
                <p class="text-xs opacity-80">מערכת ניהול הזמנות וסידור נהגים</p>
            </div>
            <i class="fas fa-truck-loading text-3xl text-yellow-400"></i>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        
        <div class="bg-white rounded-3xl shadow-lg p-6 border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-6 border-b pb-2 flex items-center gap-2">
                <i class="fas fa-file-invoice text-blue-600"></i> פרטי הזמנה חדשה
            </h2>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">תאריך</label>
                        <input id="date" type="date" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">שעה</label>
                        <input id="time" type="time" value="07:00" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">שם לקוח</label>
                        <input id="client" type="text" placeholder="שם הלקוח" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">כתובת</label>
                        <input id="address" type="text" placeholder="עיר ורחוב" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">סוג פריקה / הובלה</label>
                        <select id="deliveryType" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                            <option>הובלת משאית</option>
                            <option>הובלת מנוף</option>
                            <option>הובלת מנוף 15 מטר</option>
                            <option>משיכה עצמית</option>
                            <option>מוביל חיצוני</option>
                            <option>איסוף בלות פסולת</option>
                            <option>גישה לאתר+עבודת מנוף</option>
                            <option>עבודת מנוף</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">מחסן</label>
                        <select id="warehouse" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                            <option>התלמיד</option>
                            <option>החרש</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">בחירת נהג</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectDriver('עלי')" id="btn-ali" class="driver-btn p-3 border-2 rounded-xl font-bold transition-all text-slate-600 border-slate-200">
                            עלי (משאית) 🚚
                        </button>
                        <button onclick="selectDriver('חכמת')" id="btn-hachmat" class="driver-btn p-3 border-2 rounded-xl font-bold transition-all text-slate-600 border-slate-200">
                            חכמת (מנוף) 🏗️
                        </button>
                    </div>
                </div>

                <button id="sendBtn" class="w-full bg-blue-600 hover:bg-blue-800 text-white font-black py-4 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3 mt-4 text-xl">
                    <i class="fab fa-whatsapp"></i> שלח סידור לנהג 🚀
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1",
            storageBucket: "whatsapp-8ffd1.firebasestorage.app",
            messagingSenderId: "248003330797",
            appId: "1:248003330797:web:db93f4c5b223bfa647c2e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedDriver = "";
        const driverPhones = { "עלי": "972508860896", "חכמת": "972502120038" };

        window.selectDriver = (name) => {
            selectedDriver = name;
            document.querySelectorAll('.driver-btn').forEach(btn => btn.classList.remove('border-blue-600', 'bg-blue-50', 'text-blue-600'));
            const activeBtn = document.getElementById(`btn-${name === 'עלי' ? 'ali' : 'hachmat'}`);
            activeBtn.classList.add('border-blue-600', 'bg-blue-50', 'text-blue-600');
        };

        document.getElementById('sendBtn').onclick = async () => {
            if (!selectedDriver) return alert("רמי, נא לבחור נהג!");
            
            const data = {
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                client: document.getElementById('client').value,
                address: document.getElementById('address').value,
                delivery: document.getElementById('deliveryType').value,
                warehouse: document.getElementById('warehouse').value
            };

            const message = `*📋 סידור עבודה - ח. סבן 1994 בע"מ*\n\n` +
                          `📅 *תאריך:* ${data.date}\n` +
                          `⏰ *שעה:* ${data.time}\n` +
                          `👤 *לקוח:* ${data.client}\n` +
                          `📍 *כתובת:* ${data.address}\n\n` +
                          `🏗️ *סוג פריקה:* ${data.delivery}\n` +
                          `🏠 *מחסן:* ${data.warehouse}\n` +
                          `🚛 *נהג:* ${selectedDriver}\n\n` +
                          `_נא לאשר קבלת סידור. סע בזהירות!_ 🚀`;

            try {
                await push(ref(db, 'saban94/send'), {
                    to: driverPhones[selectedDriver],
                    text: message
                });
                alert("הסידור נשלח בהצלחה ל-" + selectedDriver + " ✅");
            } catch (e) {
                alert("שגיאה בשליחה: " + e.message);
            }
        };

        // הגדרת תאריך להיום כברירת מחדל
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
