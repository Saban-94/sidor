<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Saban AI - WhatsApp Web Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; background: #f0f2f5; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        .sidebar { width: 350px; background: white; border-left: 1px solid #ddd; z-index: 50; display: flex; flex-direction: column; }
        .chat-area { flex: 1; background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; position: relative; }
        #chat-canvas { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        footer { background: #f0f2f5; padding: 15px; z-index: 1000; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none; z-index: 1100; position: relative; pointer-events: auto !important; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <header class="p-4 bg-[#f0f2f5] border-b font-bold">ח. סבן AI - ווטסאפ עסקי</header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="chat-area">
        <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center gap-3">
            <div id="status-led" class="w-3 h-3 bg-red-500 rounded-full"></div>
            <span id="active-name" class="font-bold text-sm text-gray-700">בחר שיחה</span>
        </header>
        <div id="chat-canvas"></div>
        <footer>
            <input id="msg-input" type="text" placeholder="הקלד הודעה..." autocomplete="off">
            <button id="send-btn" class="bg-green-600 text-white p-2 px-4 rounded-lg shadow-md">שלח</button>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);

        // בדיקת חיבור יציב
        onValue(ref(rtdb, '.info/connected'), (snap) => {
            document.getElementById('status-led').className = snap.val() ? "w-3 h-3 bg-green-500 rounded-full" : "w-3 h-3 bg-red-500 rounded-full";
        });

        // פונקציית שליחה (Enter & Button)
async function doSend() {
        const input = document.getElementById('msg-input');
        const phone = document.getElementById('active-name').innerText;
        if(!input.value.trim() || phone.includes("בחר")) return;

        // שליחה לנתיב ש-JONI מאזין לו
        const sendRef = ref(rtdb, 'saban94/send');
        await push(sendRef, {
            to: phone,

    });
        window.loadChat = (phone) => {
            document.getElementById('active-name').innerText = phone;
            document.getElementById('msg-input').focus();
        };
    </script>
</body>
</html>
