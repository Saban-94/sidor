<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban AI - Firestore Memory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans">

    <header class="bg-[#075e54] text-white p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold">S</div>
            <div>
                <h1 class="font-bold text-lg">מוקד ח. סבן - זיכרון חכם</h1>
                <p class="text-[10px] opacity-80">מחובר ל-Firestore & Gemini 3.1</p>
            </div>
        </div>
    </header>

    <main id="chat-canvas" class="flex-1 overflow-y-auto p-4 space-y-3 bg-[#e5ddd5]">
        </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // הגדרות הפרויקט שלך
        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const dbFS = getFirestore(app);
        const GEMINI_KEY = "AIzaSyCRI9-rhAdY1ER2WdDxvt-T10pqrIhxDMs";
        const targetPhone = "972508860896"; // מספר היעד לבדיקה

        // 1. פונקציית המוח - Gemini 3.1 Flash-Lite
        async function getAIResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_KEY}`;
            const prompt = {
                contents: [{ parts: [{ text: `אתה נציג ח. סבן. לקוח שואל: ${userText}` }] }]
            };
            const res = await fetch(url, { method: 'POST', body: JSON.stringify(prompt) });
            const json = await res.json();
            return json.candidates[0].content.parts[0].text;
        }

        // 2. פונקציית יצירת קולקציה וניהול זיכרון ב-Firestore
        async function manageCustomerMemory(phone, text, type) {
            // יצירת/עדכון מסמך הלקוח (קולקציה אוטומטית)
            const customerRef = doc(dbFS, "customers", phone);
            await setDoc(customerRef, {
                last_msg: text,
                updatedAt: serverTimestamp()
            }, { merge: true });

            // שמירת ההודעה בתת-קולקציה של היסטוריה
            const historyRef = collection(dbFS, "customers", phone, "chat_history");
            await addDoc(historyRef, {
                text: text,
                type: type, // 'in' או 'out'
                time: serverTimestamp()
            });
        }

        // 3. האזנה להודעות נכנסות מה-RTDB (מ-JONI)
        onValue(ref(rtdb, 'saban94/incoming'), async (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const lastId = Object.keys(data).pop();
                const msg = data[lastId];

                if (!msg.processed) {
                    // א. שמירה בזיכרון Firestore
                    await manageCustomerMemory(msg.from, msg.text, 'in');

                    // ב. קבלת תשובה מה-AI
                    const aiText = await getAIResponse(msg.text);

                    // ג. שמירת תשובת הבוט בזיכרון
                    await manageCustomerMemory(msg.from, aiText, 'out');

                    // ד. שליחה פיזית לווטסאפ דרך JONI
                    await push(ref(rtdb, 'saban94/send'), { to: msg.from, text: aiText });

                    // ה. סימון כטופל
                    await set(ref(rtdb, `saban94/incoming/${lastId}/processed`), true);
                }
            }
        });

        // 4. הצגת ההיסטוריה מה-Firestore על הקנבס
        const historyQuery = query(collection(dbFS, "customers", targetPhone, "chat_history"), orderBy("time", "asc"));
        onSnapshot(historyQuery, (snapshot) => {
            const canvas = document.getElementById('chat-canvas');
            canvas.innerHTML = '';
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const div = document.createElement('div');
                const side = msg.type === 'in' ? 'bg-white self-start' : 'bg-[#dcf8c6] self-end';
                div.className = `${side} p-2 rounded-lg shadow-sm max-w-[80%] text-sm mb-2`;
                div.innerText = msg.text;
                canvas.appendChild(div);
            });
            canvas.scrollTop = canvas.scrollHeight;
        });

    </script>
</body>
</html>
