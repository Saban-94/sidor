<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban Chat Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    </style>
</head>
<body class="bg-gray-200 font-sans h-screen flex flex-col">

    <header class="bg-[#075e54] text-white p-4 flex items-center gap-3 shadow-md">
        <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold">ס</div>
        <div>
            <h1 class="font-bold">מוקד הזמנות - ח. סבן</h1>
            <p class="text-xs opacity-75">צ'אט-בוט פעיל ומאזין...</p>
        </div>
    </header>

    <main id="chat-canvas" class="flex-1 overflow-y-auto p-4 chat-bg flex flex-col gap-2">
        </main>

    <footer class="bg-[#f0f0f0] p-3 flex gap-2 items-center">
        <input id="msgInput" type="text" placeholder="הקלד הודעה ללקוח..." class="flex-1 p-2 rounded-full border-none outline-none px-4">
        <button id="sendBtn" class="bg-[#00a884] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
            <i class="fas fa-paper-plane"></i>
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatCanvas = document.getElementById('chat-canvas');

        // האזנה להודעות נכנסות ויוצאות (הצגת ההיסטוריה)
        const chatRef = ref(db, 'saban94/chats/972508860896'); // דוגמה לפי מספר טלפון
        onValue(chatRef, (snapshot) => {
            chatCanvas.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(msg => {
                    renderMessage(msg.text, msg.type === 'in' ? 'left' : 'right');
                });
                chatCanvas.scrollTop = chatCanvas.scrollHeight;
            }
        });

        function renderMessage(text, side) {
            const div = document.createElement('div');
            const align = side === 'left' ? 'self-start bg-white' : 'self-end bg-[#dcf8c6]';
            div.className = `${align} p-2 rounded-lg shadow-sm max-w-[80%] text-sm mb-1`;
            div.innerText = text;
            chatCanvas.appendChild(div);
        }

        // ביצוע הזמנה/שליחה דרך הממשק
        document.getElementById('sendBtn').onclick = async () => {
            const text = document.getElementById('msgInput').value;
            if(!text) return;

            const phone = "972508860896"; // המספר של הלקוח

            // 1. שמירה בזיכרון (Chats)
            await push(ref(db, `saban94/chats/${phone}`), { text, type: 'out', time: serverTimestamp() });

            // 2. שליחה ל-JONI לביצוע בווטסאפ
            await push(ref(db, 'saban94/send'), { to: phone, text: text });

            document.getElementById('msgInput').value = '';
        };
    </script>
</body>
</html>
