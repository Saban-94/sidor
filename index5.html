<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // קונפיגורציה המבוססת על המאגר שלך
    const firebaseConfig = {
        apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
        databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "whatsapp-8ffd1"
    };

    const app = initializeApp(firebaseConfig);
    const dbFS = getFirestore(app);
    const rtdb = getDatabase(app);

    const ramiPhone = "+972508860896";

    // פונקציה לתיקון תאריכים מה-CSV (מונעת שגיאות Invalid Date)
    function safeParseDate(dStr, tStr) {
        try {
            const p = dStr.split('.');
            if (p.length !== 3) return null;
            const iso = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}T${tStr.trim()}`;
            const d = new Date(iso);
            return isNaN(d.getTime()) ? null : d;
        } catch(e) { return null; }
    }

    // צינור ריל-טיים (JONI Sync) - מאזין להודעות בשידור חי
    function startRamiLiveSync() {
        const incomingRef = ref(rtdb, 'saban94/incoming');
        onValue(incomingRef, async (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const lastKey = Object.keys(data).pop();
                const msg = data[lastKey];
                
                // אם ההודעה היא מראמי או אליו, הזרק לכרטיס האישי
                if (msg.from === ramiPhone || msg.to === ramiPhone) {
                    await addDoc(collection(dbFS, "customers", ramiPhone, "chat_history"), {
                        text: msg.text,
                        type: msg.from === ramiPhone ? 'out' : 'in',
                        timestamp: serverTimestamp(),
                        source: 'JONI_LIVE'
                    });
                }
            }
        });
    }

    // פונקציית הזרקת היסטוריה מהקובץ שהעלית
    window.injectRamiHistory = async (csvText) => {
        const lines = csvText.split('\n').slice(1);
        let count = 0;
        for (let line of lines) {
            const parts = line.split(',');
            if (parts.length < 4) continue;
            const [date, time, sender, text] = parts;
            const ts = safeParseDate(date, time);
            
            // בדיקה אם ההודעה קשורה לראמי (לפי שם השולח או תוכן)
            if (sender.includes("ראמי") || text.includes(ramiPhone)) {
                await addDoc(collection(dbFS, "customers", ramiPhone, "chat_history"), {
                    text: text.trim().replace(/^"|"$/g, ''),
                    type: sender.includes("ראמי") ? 'out' : 'in',
                    timestamp: ts || new Date(),
                    source: 'CSV_IMPORT'
                });
                count++;
            }
        }
        console.log(`הוזרקו ${count} הודעות לצינור של ראמי.`);
    };

    // אתחול הכרטיס של ראמי עם התמונה והפרטים
    async function initRamiCard() {
        await setDoc(doc(dbFS, "customers", ramiPhone), {
            name: "ראמי מסארוה",
            photo: "https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?...",
            role: "Owner",
            phone: ramiPhone
        }, { merge: true });
        startRamiLiveSync();
    }

    initRamiCard();
</script>
