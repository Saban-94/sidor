<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban AI Studio - Production Fix</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:,">
    <link rel="manifest" href='data:application/json,{"name":"Saban AI Studio","short_name":"Saban AI","display":"standalone","start_url":"/"}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap');
        body { font-family: 'Rubik', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble-in { background: #ffffff; border-radius: 8px 8px 8px 0; align-self: flex-start; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .bubble-out { background: #dcf8c6; border-radius: 8px 8px 0 8px; align-self: flex-end; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .tab-content { display: none; width: 100%; height: 100%; flex-direction: column; }
        .tab-content.active { display: flex; }
    </style>
</head>
<body class="flex flex-row h-full w-full">

    <aside class="w-[60px] bg-[#eae6df] border-l flex flex-col items-center py-6 gap-8 text-[#54656f] shrink-0">
        <button onclick="showTab('dispatch')" title="סידור עבודה"><i class="fas fa-truck-loading text-xl"></i></button>
        <button onclick="showTab('chat')" title="צ'אט AI"><i class="fab fa-whatsapp text-2xl"></i></button>
        <button onclick="document.getElementById('csv-upload').click()" title="הזרקת היסטוריה"><i class="fas fa-file-import text-xl"></i></button>
        <input type="file" id="csv-upload" class="hidden" accept=".csv">
    </aside>

    <aside class="w-[320px] bg-white border-l flex flex-col shrink-0">
        <header class="p-4 bg-[#f0f2f5] border-b font-bold text-lg">הזמנות ח. סבן</header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="flex-1 relative overflow-hidden">
        <div id="dispatch" class="tab-content p-6 overflow-y-auto">
            <h2 class="text-2xl font-bold mb-4 italic text-blue-800">סידור עבודה - ח. סבן</h2>
            <p>הנתונים מסונכרנים מ-Google Sheets ו-Firestore.</p>
        </div>

        <div id="chat" class="tab-content active">
            <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center gap-3">
                <div id="active-avatar" class="w-10 h-10 bg-[#4587de] rounded-full flex items-center justify-center text-white font-bold">S</div>
                <span id="active-name" class="font-bold text-sm">בחר צ'אט מהרשימה</span>
            </header>
            <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-6 flex flex-col gap-2"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };

        const app = initializeApp(firebaseConfig);
        const dbFS = getFirestore(app);

        // פונקציית ניווט חשופה ל-window
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // פונקציית המרת תאריך חזקה יותר
        function parseSabanDate(dateStr, timeStr) {
            try {
                if (!dateStr || !timeStr) return null;
                const dParts = dateStr.trim().split('.');
                if (dParts.length !== 3) return null;
                
                // וודא פורמט YYYY-MM-DD
                const day = dParts[0].padStart(2, '0');
                const month = dParts[1].padStart(2, '0');
                const year = dParts[2];
                
                const dateIso = `${year}-${month}-${day}`;
                const timeClean = timeStr.trim();
                const timestamp = new Date(`${dateIso}T${timeClean}`);
                
                return isNaN(timestamp.getTime()) ? null : timestamp;
            } catch (e) { return null; }
        }

        // הזרקת CSV
        document.getElementById('csv-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const lines = event.target.result.split('\n').slice(1);
                let count = 0;
                for (let line of lines) {
                    const parts = line.split(',');
                    if (parts.length < 4) continue;
                    
                    const [dateStr, timeStr, sender, text] = parts;
                    const timestamp = parseSabanDate(dateStr, timeStr);
                    
                    if (!timestamp) {
                        console.warn("Skipping invalid date:", dateStr, timeStr);
                        continue;
                    }

                    const phoneMatch = text.match(/\+972\d+/);
                    const phone = phoneMatch ? phoneMatch[0] : "General";
                    
                    await addDoc(collection(dbFS, "customers", phone, "chat_history"), {
                        text: text.replace(/^"|"$/g, '').trim(),
                        type: sender.includes("הזמנות ח. סבן") ? 'in' : 'out',
                        timestamp: timestamp
                    });
                    await setDoc(doc(dbFS, "customers", phone), { name: phone, last_msg: text }, { merge: true });
                    count++;
                }
                alert(`הוזרקו ${count} הודעות בהצלחה!`);
            };
            reader.readAsText(file);
        };

        // טעינת רשימת לקוחות
        onSnapshot(collection(dbFS, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.insertAdjacentHTML('beforeend', `
                    <div onclick="window.loadChat('${d.id}')" class="p-4 border-b hover:bg-gray-100 cursor-pointer flex flex-col gap-1">
                        <div class="font-bold text-sm">${d.id}</div>
                        <div class="text-[10px] text-gray-400 truncate">${data.last_msg || ''}</div>
                    </div>`);
            });
        });

        // טעינת צ'אט נבחר
        window.loadChat = (phone) => {
            document.getElementById('active-name').innerText = phone;
            const q = query(collection(dbFS, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const style = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="${style} p-3 max-w-[80%] text-sm mb-1">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };

    </script>
</body>
</html>
