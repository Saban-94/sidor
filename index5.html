<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban AI Studio | Rami Profile & History</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble-in { background: #ffffff; border-radius: 0 10px 10px 10px; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble-out { background: #dcf8c6; border-radius: 10px 0 10px 10px; align-self: flex-end; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .active-card { background-color: #f0f2f5; border-right: 4px solid #00a884; }
    </style>
</head>
<body class="flex flex-row h-full w-full">

    <aside class="w-[65px] bg-[#eae6df] border-l flex flex-col items-center py-6 gap-8 text-[#54656f] shrink-0">
        <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-sm">
            <img src="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111" alt="Rami">
        </div>
        <button onclick="document.getElementById('csv-upload').click()" class="hover:text-green-600 transition">
            <i class="fas fa-file-upload text-2xl"></i>
        </button>
        <input type="file" id="csv-upload" class="hidden" accept=".csv">
    </aside>

    <aside class="w-[350px] bg-white border-l flex flex-col shrink-0 overflow-hidden">
        <header class="p-4 bg-[#f0f2f5] border-b flex justify-between items-center">
            <h2 class="font-bold text-xl">צ'אטים</h2>
            <i class="fas fa-filter text-gray-500"></i>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto">
            </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header id="chat-header" class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img id="header-img" src="" class="w-10 h-10 rounded-full hidden">
                <div id="header-initial" class="w-10 h-10 bg-gray-400 rounded-full flex items-center justify-center text-white font-bold">?</div>
                <div>
                    <span id="active-name" class="font-bold text-sm block">בחר כרטיס לקוח</span>
                    <span id="active-status" class="text-[10px] text-gray-500">לחץ להצגת היסטוריה</span>
                </div>
            </div>
        </header>

        <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-6 flex flex-col gap-3">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            projectId: "whatsapp-8ffd1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // פונקציית עזר לתיקון תאריכים מה-CSV (פורמט D.M.YYYY)
        function parseDate(dStr, tStr) {
            try {
                const p = dStr.split('.');
                const dateIso = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                return new Date(`${dateIso}T${tStr}`);
            } catch(e) { return null; }
        }

        // 1. יצירת הכרטיס האישי שלך (ראמי מסארוה) באופן יזום
        const ramiPhone = "+972508860896";
        async function createRamiProfile() {
            await setDoc(doc(db, "customers", ramiPhone), {
                name: "ראמי מסארוה",
                photo: "https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/550105006_4278328025731724_3121613582132586623_n.jpg?ccb=11-4&oh=01_Q5Aa3wE_WLNZW6uVcUD0j31RWKTIoW3Q9fV9LQFOefrCt-G9Lw&oe=69B6C114&_nc_sid=5e03e0&_nc_cat=111",
                isOwner: true
            }, { merge: true });
        }
        createRamiProfile();

        // 2. הזרקת היסטוריה מה-CSV
        document.getElementById('csv-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const lines = event.target.result.split('\n').slice(1);
                let count = 0;
                for (let line of lines) {
                    const r = line.split(',');
                    if (r.length < 4) continue;
                    
                    const [date, time, sender, text] = r;
                    const ts = parseDate(date, time);
                    if (!ts) continue;

                    // זיהוי אם ההודעה שייכת לראמי או ללקוח אחר
                    const phoneMatch = text.match(/\+972\d+/);
                    const targetPhone = phoneMatch ? phoneMatch[0] : (sender.includes("ראמי") ? ramiPhone : "General");

                    await addDoc(collection(db, "customers", targetPhone, "chat_history"), {
                        text: text.replace(/^"|"$/g, '').trim(),
                        type: sender.includes("הזמנות ח. סבן") ? 'in' : 'out',
                        timestamp: ts
                    });
                    count++;
                }
                alert(`הוזרקו ${count} הודעות בהצלחה!`);
            };
            reader.readAsText(file);
        };

        // 3. טעינת רשימת הכרטיסים
        onSnapshot(collection(db, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                const isRami = d.id === ramiPhone;
                list.insertAdjacentHTML('beforeend', `
                    <div onclick="window.loadChat('${d.id}', '${data.name || d.id}', '${data.photo || ''}')" 
                         class="p-4 border-b hover:bg-gray-50 cursor-pointer flex items-center gap-3 transition">
                        <div class="w-12 h-12 rounded-full overflow-hidden flex items-center justify-center bg-blue-500 text-white font-bold">
                            ${data.photo ? `<img src="${data.photo}">` : (data.name ? data.name[0] : '?')}
                        </div>
                        <div class="flex-1">
                            <div class="font-bold text-sm">${data.name || d.id} ${isRami ? '(אני)' : ''}</div>
                            <div class="text-xs text-gray-500 truncate italic">לחץ לצפייה בהיסטוריה</div>
                        </div>
                    </div>`);
            });
        });

        // 4. טעינת הצ'אט הספציפי
        window.loadChat = (phone, name, photo) => {
            document.getElementById('active-name').innerText = name;
            const headerImg = document.getElementById('header-img');
            const headerInit = document.getElementById('header-initial');
            
            if (photo) {
                headerImg.src = photo;
                headerImg.classList.remove('hidden');
                headerInit.classList.add('hidden');
            } else {
                headerImg.classList.add('hidden');
                headerInit.classList.remove('hidden');
                headerInit.innerText = name[0];
            }

            const q = query(collection(db, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const style = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `
                        <div class="${style} p-3 max-w-[80%] text-sm">
                            ${m.text}
                            <div class="text-[9px] text-gray-400 mt-1">${new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };
    </script>
</body>
</html>
