<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban AI Studio - Enterprise</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:,">
    <link rel="manifest" href='data:application/json,{"name":"Saban AI Studio","short_name":"Saban AI","display":"standalone","start_url":"."}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap');
        body { font-family: 'Rubik', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble-in { background: #ffffff; border-radius: 8px 8px 8px 0; align-self: flex-start; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .bubble-out { background: #dcf8c6; border-radius: 8px 8px 0 8px; align-self: flex-end; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
    </style>
</head>
<body class="flex flex-row h-full w-full">

    <aside class="w-[60px] bg-[#eae6df] border-l flex flex-col items-center py-6 gap-8 text-[#54656f]">
        <button onclick="showTab('dispatch')" title="סידור עבודה"><i class="fas fa-truck-loading text-xl"></i></button>
        <button onclick="showTab('chat')" title="צ'אט AI"><i class="fab fa-whatsapp text-2xl"></i></button>
        <button onclick="document.getElementById('csv-upload').click()" title="הזרקת היסטוריה"><i class="fas fa-file-import text-xl"></i></button>
        <input type="file" id="csv-upload" class="hidden" accept=".csv">
    </aside>

    <aside class="w-[380px] bg-white border-l flex flex-col">
        <header class="p-4 bg-[#f0f2f5] border-b font-bold text-lg">הזמנות לקוחות ח.סבן</header>
        <div id="customer-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <main class="flex-1 relative">
        <div id="chat" class="tab-content active flex flex-col h-full">
            <header class="h-[60px] bg-[#f0f2f5] border-b p-3 flex items-center gap-3">
                <div id="active-avatar" class="w-10 h-10 bg-[#4587de] rounded-full flex items-center justify-center text-white font-bold text-xl shadow-sm">S</div>
                <div>
                    <span id="active-name" class="font-bold text-sm block">בחר לקוח מהרשימה</span>
                    <small class="text-[10px] text-green-600">JONI Adapter: Online</small>
                </div>
            </header>
            <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-6 flex flex-col gap-2"></div>
            <footer class="p-3 bg-[#f0f2f5] flex items-center gap-3">
                <input id="reply-msg" type="text" placeholder="הקלדת הודעה" class="flex-1 p-2.5 bg-white rounded-lg outline-none text-sm shadow-sm">
                <button id="btn-send" class="text-[#54656f] text-xl"><i class="fas fa-paper-plane"></i></button>
            </footer>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const dbFS = getFirestore(app);
        let activePhone = "";

        // תיקון פונקציית הזרקת ה-CSV
        document.getElementById('csv-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const lines = event.target.result.split('\n').slice(1);
                for (let line of lines) {
                    const parts = line.split(',');
                    if (parts.length < 4) continue;
                    
                    const [dateStr, timeStr, sender, text] = parts;
                    
                    // המרת פורמט תאריך מ-3.12.2025 ל-2025-12-03
                    const dateParts = dateStr.trim().split('.');
                    if (dateParts.length !== 3) continue;
                    const formattedDate = `${dateParts[2]}-${dateParts[1].padStart(2, '0')}-${dateParts[0].padStart(2, '0')}`;
                    
                    const timestamp = new Date(`${formattedDate}T${timeStr.trim()}`);
                    
                    // בדיקת תקינות הזמן לפני השליחה ל-Firestore
                    if (isNaN(timestamp.getTime())) {
                        console.error("Invalid date found:", dateStr, timeStr);
                        continue;
                    }

                    const phoneMatch = text.match(/\+972\d+/);
                    const phone = phoneMatch ? phoneMatch[0] : "General";
                    const isSaban = sender.includes("הזמנות ח. סבן");
                    
                    await addDoc(collection(dbFS, "customers", phone, "chat_history"), {
                        text: text.replace(/^"|"$/g, '').trim(),
                        type: isSaban ? 'in' : 'out',
                        timestamp: timestamp
                    });
                    await setDoc(doc(dbFS, "customers", phone), { name: phone, last_msg: text }, { merge: true });
                }
                alert("ההיסטוריה הוזרקה בהצלחה!");
            };
            reader.readAsText(file);
        };

        // הצגת רשימת לקוחות והיסטוריה
        onSnapshot(collection(dbFS, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const id = d.id;
                list.insertAdjacentHTML('beforeend', `
                    <div onclick="window.loadChat('${id}')" class="p-4 border-b hover:bg-gray-100 cursor-pointer flex items-center gap-3">
                        <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center font-bold text-gray-600">C</div>
                        <div class="flex-1 overflow-hidden">
                            <div class="font-bold text-sm">${id}</div>
                            <div class="text-xs text-gray-500 truncate">${d.data().last_msg || ''}</div>
                        </div>
                    </div>`);
            });
        });

        window.loadChat = (phone) => {
            activePhone = phone;
            document.getElementById('active-name').innerText = phone;
            const q = query(collection(dbFS, "customers", phone, "chat_history"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const style = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="${style} p-3 max-w-[80%] text-sm mb-1">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };
        
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        };

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('reply-msg');
            if (activePhone && input.value) {
                await push(ref(rtdb, 'saban94/send'), { to: activePhone, text: input.value });
                input.value = '';
            }
        };
    </script>
</body>
</html>
