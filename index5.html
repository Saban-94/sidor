<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban AI - Customer Orders Mirror</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble-in { background: #ffffff; border-radius: 8px 8px 8px 0; align-self: flex-start; }
        .bubble-out { background: #dcf8c6; border-radius: 8px 8px 0 8px; align-self: flex-end; }
        .sidebar { width: 350px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <header class="p-4 bg-[#f0f2f5] flex justify-between items-center border-b">
            <h2 class="font-bold text-slate-800">הזמנות לקוחות ח.סבן</h2>
            <i class="fas fa-ellipsis-v text-gray-500"></i>
        </header>
        <div id="customer-list" class="flex-1 overflow-y-auto">
            </div>
    </aside>

    <section class="flex-1 flex flex-col whatsapp-bg">
        <header class="p-3 bg-[#f0f2f5] border-b flex items-center gap-3">
            <div id="active-avatar" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">S</div>
            <div>
                <span id="active-name" class="font-bold block text-sm text-slate-800 italic">בחר לקוח מהרשימה</span>
                <small class="text-[10px] text-green-600">סנכרון JONI פעיל • 3s</small>
            </div>
        </header>

        <div id="chat-canvas" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
            </div>

        <footer class="p-3 bg-[#f0f2f5] flex items-center gap-2">
            <input id="reply-input" type="text" placeholder="הקלד הודעה..." class="flex-1 p-2.5 rounded-lg border-none outline-none text-sm">
            <button id="send-btn" class="text-[#54656f] text-xl p-2"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // הגדרות Firebase מהמאגר שלך
        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };
        const GEMINI_KEY = "AIzaSyCRI9-rhAdY1ER2WdDxvt-T10pqrIhxDMs"; // מפתח Gemini

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const dbFS = getFirestore(app);

        let activePhone = "";

        // --- 1. הצינור (JONI Sync) ---
        // האזנה להודעות נכנסות מ-JONI
        onValue(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if (data) {
                const id = Object.keys(data).pop();
                const msg = data[id];

                if (!msg.processed) {
                    // שמירה לקולקציית הלקוח ב-Firestore (היסטוריה חוזרת)
                    const historyRef = collection(dbFS, "customers", msg.from, "chat_history");
                    await addDoc(historyRef, { text: msg.text, type: 'in', time: serverTimestamp() });

                    // הפעלת המוח (AI Response)
                    const aiReply = await askGemini(msg.text);

                    // שליחה חזרה ל-JONI
                    await push(ref(rtdb, 'saban94/send'), { to: msg.from, text: aiReply });
                    await addDoc(historyRef, { text: aiReply, type: 'out', time: serverTimestamp() });

                    // סימון כטופל ב-RTDB
                    set(ref(rtdb, `saban94/incoming/${id}/processed`), true);
                }
            }
        });

        // --- 2. המוח (Gemini 3.1 Logic) ---
        async function askGemini(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_KEY}`;
            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: `אתה נציג ח. סבן. ענה ללקוח: ${text}` }] }] })
            });
            const json = await res.json();
            return json.candidates[0].content.parts[0].text;
        }

        // --- 3. הזרקה לממשק (UI Injection) ---
        window.loadChat = (phone) => {
            activePhone = phone;
            document.getElementById('active-name').innerText = "לקוח: " + phone;
            
            const q = query(collection(dbFS, "customers", phone, "chat_history"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const canvas = document.getElementById('chat-canvas');
                canvas.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const style = m.type === 'in' ? 'bubble-in' : 'bubble-out';
                    canvas.insertAdjacentHTML('beforeend', `<div class="${style} p-2 shadow-sm max-w-[80%] text-sm mb-1">${m.text}</div>`);
                });
                canvas.scrollTop = canvas.scrollHeight;
            });
        };

        // הזרקת רשימת הלקוחות לסיידבר
        onSnapshot(collection(dbFS, "customers"), (snap) => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.id;
                list.insertAdjacentHTML('beforeend', `
                    <div onclick="loadChat('${c}')" class="p-4 border-b hover:bg-gray-100 cursor-pointer flex items-center gap-3">
                        <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center font-bold">C</div>
                        <span class="text-sm font-bold text-slate-700">${c}</span>
                    </div>
                `);
            });
        });

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('reply-input');
            if (!activePhone || !input.value) return;
            await push(ref(rtdb, 'saban94/send'), { to: activePhone, text: input.value });
            input.value = '';
        };
    </script>
</body>
</html>
