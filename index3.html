<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban Brain CRM - Full Sync</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{'name':'SabanBrain','display':'standalone'}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-content { display: none; height: calc(100vh - 65px); }
        .tab-content.active { display: flex; }
        .active-tab { border-bottom: 4px solid #075e54; color: #075e54; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen overflow-hidden">

    <nav class="bg-white shadow-md flex justify-around p-3 z-50 shrink-0">
        <button onclick="showTab('morning')" id="nav-morning" class="font-bold active-tab px-4">
            <i class="fas fa-clipboard-list ml-1"></i>סידור
        </button>
        <button onclick="showTab('chat')" id="nav-chat" class="font-bold text-green-700 px-4">
            <i class="fab fa-whatsapp ml-1"></i>צ'אט AI
        </button>
    </nav>

    <div id="morning" class="tab-content active flex-col p-4 overflow-y-auto">
        <div class="max-w-md mx-auto w-full bg-white p-6 rounded-3xl shadow-lg border-t-4 border-blue-600">
            <h2 class="text-xl font-bold mb-4">🏗️ סידור עבודה ח. סבן</h2>
            <div class="grid grid-cols-1 gap-3">
                <input id="rep-client" type="text" placeholder="שם הלקוח" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <input id="rep-address" type="text" placeholder="כתובת פריקה" class="p-4 bg-gray-50 border rounded-2xl outline-none">
                <select id="rep-driver" class="p-4 bg-blue-50 border rounded-2xl font-bold">
                    <option value="עלי">עלי (משאית) 🚚</option>
                    <option value="חכמת">חכמת (מנוף) 🏗️</option>
                </select>
                <button id="sendReportBtn" class="bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all">שלח דוח בוקר 🚀</button>
            </div>
        </div>
    </div>

    <div id="chat" class="tab-content flex-col overflow-hidden">
        <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-4 flex flex-col gap-3">
            <div class="self-center bg-white/80 text-[10px] px-3 py-1 rounded-full shadow-sm text-gray-500">הודעות מסונכרנות מ-JONI</div>
        </div>
        <div class="p-3 bg-gray-100 flex gap-2 border-t shrink-0">
            <input id="manual-msg" type="text" placeholder="הקלד הודעה..." class="flex-1 p-3 rounded-full border outline-none bg-white">
            <button id="manualReplyBtn" class="bg-[#075e54] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };
        
        // מפתח Gemini שבדקנו והוא עובד
        const GEMINI_KEY = "הכנס_כאן_את_המפתח_העובד"; 
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const dbFS = getFirestore(app);

        // --- פונקציית המוח Gemini ---
        async function askGemini(text) {
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_KEY}`;
                const payload = {
                    contents: [{ parts: [{ text: `אתה נציג ח. סבן 1994. ענה ללקוח בווטסאפ בקצרה ובאדיבות. הלקוח שאל: ${text}` }] }]
                };
                const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "נציג אנושי יחזור אליך בהקדם.";
            }
        }

        // --- האזנה ל-JONI (Incoming) ---
        onValue(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if (data) {
                const id = Object.keys(data).pop();
                const msg = data[id];
                
                if (!msg.ai_done) {
                    // 1. קבלת תשובה מה-AI
                    const reply = await askGemini(msg.text);
                    
                    // 2. הצגה בקנבס (צד שמאל - לקוח)
                    renderMessage(msg.text, 'left');
                    
                    // 3. שליחה דרך JONI
                    await push(ref(rtdb, 'saban94/send'), { to: msg.from || "972508860896", text: reply });
                    renderMessage(reply, 'right');

                    // 4. שמירה בזיכרון Firestore
                    const custRef = collection(dbFS, "customers", msg.from || "unknown", "history");
                    await addDoc(custRef, { text: msg.text, type: 'in', time: serverTimestamp() });
                    await addDoc(custRef, { text: reply, type: 'out', time: serverTimestamp() });

                    // 5. סימון כטופל ב-RTDB
                    set(ref(rtdb, `saban94/incoming/${id}/ai_done`), true);
                }
            }
        });

        // פונקציה להצגת הודעות בקנבס
        function renderMessage(text, side) {
            const canvas = document.getElementById('chat-canvas');
            const align = side === 'left' ? 'self-start bg-white' : 'self-end bg-[#dcf8c6]';
            canvas.insertAdjacentHTML('beforeend', `<div class="${align} p-3 rounded-2xl shadow-sm max-w-[80%] text-sm">${text}</div>`);
            canvas.scrollTop = canvas.scrollHeight;
        }

        // --- חיבור כפתורים ואירועים ---
        const msgInput = document.getElementById('manual-msg');
        
        const manualSend = async () => {
            const val = msgInput.value.trim();
            if (!val) return;
            await push(ref(rtdb, 'saban94/send'), { to: "972508860896", text: val });
            renderMessage(val, 'right');
            msgInput.value = '';
        };

        document.getElementById('manualReplyBtn').onclick = manualSend;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') manualSend(); };

        document.getElementById('sendReportBtn').onclick = async () => {
            const report = `*📋 סידור ח. סבן*\n👤 לקוח: ${document.getElementById('rep-client').value}\n📍 יעד: ${document.getElementById('rep-address').value}\n🚚 נהג: ${document.getElementById('rep-driver').value}`;
            await push(ref(rtdb, 'saban94/send'), { to: "972508860896", text: report });
            alert("הסידור נשלח!");
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-tab');
        };
    </script>
</body>
</html>
