<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban Brain CRM - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-content { display: none; height: calc(100vh - 120px); }
        .tab-content.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen overflow-hidden">

    <nav class="bg-white shadow-sm flex justify-around p-3 border-b shrink-0">
        <button onclick="showTab('report')" class="font-bold text-blue-900"><i class="fas fa-clipboard-list ml-1"></i>סידור</button>
        <button onclick="showTab('chat')" class="font-bold text-green-700"><i class="fab fa-whatsapp ml-1"></i>צ'אט AI</button>
    </nav>

    <div id="report" class="tab-content active flex-col p-4 overflow-y-auto">
        <div class="bg-white p-6 rounded-3xl shadow-lg border-t-4 border-blue-600">
            <h2 class="text-xl font-bold mb-4">🏗️ דוח בוקר - ח. סבן</h2>
            <div class="grid grid-cols-1 gap-3">
                <input id="rep-client" type="text" placeholder="שם הלקוח" class="p-4 bg-gray-50 border rounded-2xl outline-none">
                <button id="sendReportBtn" class="bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform">שלח דוח 🚀</button>
            </div>
        </div>
    </div>

    <div id="chat" class="tab-content flex-col overflow-hidden">
        <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-4 flex flex-col gap-3"></div>
        
        <div class="p-3 bg-gray-100 flex gap-2 border-t shrink-0">
            <input id="manual-msg" type="text" placeholder="הקלד הודעה..." 
                   class="flex-1 p-3 rounded-full border outline-none focus:ring-2 focus:ring-green-500 bg-white">
            <button id="manualReplyBtn" class="bg-[#075e54] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);

        // פונקציית שליחה ידנית
        const handleManualSend = async () => {
            const input = document.getElementById('manual-msg');
            const text = input.value.trim();
            if (!text) return;

            try {
                // שליחה למספר שלך כברירת מחדל או ללקוח פעיל
                await push(ref(rtdb, 'saban94/send'), {
                    to: "972508860896", 
                    text: text
                });
                input.value = ''; // ניקוי שדה הכתיבה
                console.log("הודעה נשלחה בהצלחה");
            } catch (e) {
                console.error("שגיאה בשליחה:", e);
            }
        };

        // חיבור אירועים - תיקון אי זיהוי מקלדת ולחיצה
        const msgInput = document.getElementById('manual-msg');
        const sendBtn = document.getElementById('manualReplyBtn');

        // זיהוי לחיצת Enter במקלדת
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleManualSend();
            }
        });

        // זיהוי לחיצה על כפתור השליחה
        sendBtn.addEventListener('click', handleManualSend);

        // ניהול לשוניות
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
