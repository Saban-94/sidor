<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban 1994 - Central Brain CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-content { display: none; }
        .tab-content.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

    <nav class="bg-white shadow-sm flex justify-around p-3 border-b">
        <button onclick="showTab('report')" class="flex items-center gap-2 font-bold text-blue-900"><i class="fas fa-clipboard-list"></i> טופס דוח בוקר</button>
        <button onclick="showTab('chat')" class="flex items-center gap-2 font-bold text-green-700"><i class="fab fa-whatsapp"></i> מוקד ווטסאפ (AI)</button>
    </nav>

    <div id="report" class="tab-content active flex-col p-6 overflow-y-auto h-full">
        <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-600">
            <h2 class="text-xl font-bold mb-4">🏗️ הזנת סידור עבודה - ח. סבן</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="rep-date" type="date" class="p-3 border rounded-xl bg-gray-50">
                <input id="rep-time" type="time" value="07:00" class="p-3 border rounded-xl bg-gray-50">
                <input id="rep-client" type="text" placeholder="שם הלקוח" class="p-3 border rounded-xl bg-gray-50 col-span-2">
                <input id="rep-address" type="text" placeholder="כתובת פריקה" class="p-3 border rounded-xl bg-gray-50 col-span-2">
                
                <select id="rep-delivery" class="p-3 border rounded-xl bg-gray-50">
                    <option>הובלת משאית</option>
                    <option>הובלת מנוף</option>
                    <option>הובלת מנוף 15 מטר</option>
                    <option>משיכה עצמית</option>
                    <option>איסוף בלות פסולת</option>
                    <option>גישה לאתר + עבודת מנוף</option>
                </select>
                
                <select id="rep-warehouse" class="p-3 border rounded-xl bg-gray-50">
                    <option>מחסן החרש</option>
                    <option>מחסן התלמיד</option>
                </select>

                <select id="rep-driver" class="p-3 border rounded-xl bg-blue-50 font-bold col-span-2">
                    <option value="עלי">עלי (נהג משאית) 🚚</option>
                    <option value="חכמת">חכמת (נהג מנוף) 🏗️</option>
                </select>
            </div>
            <button onclick="sendMorningReport()" class="w-full mt-6 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">שלח דוח לנהג ולקבוצה 🚀</button>
        </div>
    </div>

    <div id="chat" class="tab-content h-full flex overflow-hidden">
        <aside class="w-1/3 bg-white border-l overflow-y-auto" id="customer-list"></aside>
        <main class="flex-1 flex flex-col whatsapp-bg">
            <div id="chat-canvas" class="flex-1 p-6 overflow-y-auto flex flex-col space-y-3"></div>
            <div class="p-4 bg-gray-100 flex gap-2 border-t">
                <input id="manual-msg" type="text" placeholder="תשובה ידנית..." class="flex-1 p-2 rounded-lg outline-none">
                <button onclick="manualReply()" class="bg-[#075e54] text-white px-4 rounded-lg"><i class="fas fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // הגדרות Firebase ו-Gemini
        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };
        const GEMINI_KEY = "AIzaSyCRI9-rhAdY1ER2WdDxvt-T10pqrIhxDMs"
        
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const dbFS = getFirestore(app);

        // --- פונקציית המוח (Gemini 3.1) ---
        async function askGemini(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_KEY}`;
            const prompt = { contents: [{ parts: [{ text: `אתה נציג ח. סבן 1994. ענה ללקוח: ${text}` }] }] };
            const res = await fetch(url, { method: 'POST', body: JSON.stringify(prompt) });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        // --- ניהול דוח בוקר ---
        window.sendMorningReport = async () => {
            const client = document.getElementById('rep-client').value;
            const driver = document.getElementById('rep-driver').value;
            const report = `*📋 דוח בוקר ח. סבן*\n👤 לקוח: ${client}\n🚚 נהג: ${driver}\n🏗️ סוג: ${document.getElementById('rep-delivery').value}`;
            
            await push(ref(rtdb, 'saban94/send'), { to: "972508860896", text: report });
            alert("הדוח נשלח!");
        };

        // --- לוגיקת צ'אט בוט אוטומטי ---
        onValue(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if (data) {
                const id = Object.keys(data).pop();
                const msg = data[id];
                if (!msg.ai_done) {
                    const aiReply = await askGemini(msg.text);
                    await push(ref(rtdb, 'saban94/send'), { to: msg.from, text: aiReply });
                    
                    // שמירה בזיכרון Firestore
                    const hist = collection(dbFS, "customers", msg.from, "chat_history");
                    await addDoc(hist, { text: msg.text, type: 'in', time: serverTimestamp() });
                    await addDoc(hist, { text: aiReply, type: 'out', time: serverTimestamp() });
                    
                    set(ref(rtdb, `saban94/incoming/${id}/ai_done`), true);
                }
            }
        });

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        document.getElementById('rep-date').valueAsDate = new Date();
    </script>
</body>
</html>
