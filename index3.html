<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saban Brain CRM - Studio</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:,">
    <link rel="manifest" href='data:application/json,{"name":"SabanBrain","display":"standalone"}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; touch-action: manipulation; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-content { display: none; height: calc(100vh - 70px); }
        .tab-content.active { display: flex; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 flex flex-col h-screen overflow-hidden text-slate-800">

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-[100] shadow-2xl">
        <button onclick="showTab('morning')" id="nav-morning" class="flex flex-col items-center text-blue-600 font-bold opacity-100 transition-all">
            <i class="fas fa-truck-loading text-xl"></i><span class="text-xs">סידור</span>
        </button>
        <button onclick="showTab('chat')" id="nav-chat" class="flex flex-col items-center text-gray-400 font-bold opacity-50 transition-all">
            <i class="fab fa-whatsapp text-xl"></i><span class="text-xs">צ'אט AI</span>
        </button>
        <button onclick="showTab('history')" id="nav-history" class="flex flex-col items-center text-gray-400 font-bold opacity-50 transition-all">
            <i class="fas fa-database text-xl"></i><span class="text-xs">מאגר</span>
        </button>
    </nav>

    <div id="morning" class="tab-content active flex-col p-4 overflow-y-auto pb-24">
        <div class="max-w-md mx-auto w-full space-y-4">
            <header class="text-center py-4">
                <h1 class="text-2xl font-black text-slate-900">ח. סבן 1994 בע"מ</h1>
                <p class="text-sm text-slate-500 font-bold italic">ניהול לוגיסטיקה ובינה מלאכותית</p>
            </header>

            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 space-y-3">
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold mr-2 text-slate-400 uppercase">תאריך אספקה</label>
                        <input id="rep-date" type="date" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold mr-2 text-slate-400 uppercase">שעת הגעה</label>
                        <input id="rep-time" type="time" value="07:00" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                    </div>
                </div>

                <input id="rep-client" type="text" placeholder="שם הלקוח / אתר" class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold">
                <input id="rep-address" type="text" placeholder="כתובת פריקה מדויקת" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="rep-warehouse" class="p-3 bg-slate-50 border rounded-xl text-sm font-bold">
                        <option>מחסן החרש</option>
                        <option>מחסן התלמיד</option>
                    </select>
                    <select id="rep-delivery" class="p-3 bg-slate-50 border rounded-xl text-sm">
                        <option>משאית חול/סומסום</option>
                        <option>מנוף 15 מטר</option>
                        <option>איסוף בלות</option>
                    </select>
                </div>

                <select id="rep-driver" class="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-xl font-black text-blue-900">
                    <option value="עלי">עלי - משאית 🚚</option>
                    <option value="חכמת">חכמת - מנוף 🏗️</option>
                    <option value="רמי">רמי - מנהל 👑</option>
                </select>

                <button id="sendReportBtn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-2xl active:scale-95 transition-all text-lg">
                    שלח ושמור סידור 🚀
                </button>
            </div>
        </div>
    </div>

    <div id="chat" class="tab-content flex-col overflow-hidden">
        <header class="bg-[#075e54] text-white p-4 flex justify-between items-center shrink-0 shadow-lg">
            <span class="font-black tracking-tight">STUDIO | ח. סבן AI</span>
            <i class="fas fa-circle text-green-400 text-[8px] animate-pulse"></i>
        </header>
        <div id="chat-canvas" class="flex-1 whatsapp-bg overflow-y-auto p-4 flex flex-col gap-3"></div>
        <div class="p-3 bg-white flex gap-2 border-t shrink-0 pb-20">
            <input id="manual-msg" type="text" placeholder="הקלד הודעה ללקוח..." class="flex-1 p-3 rounded-full border bg-slate-50 outline-none">
            <button id="manualReplyBtn" class="bg-[#075e54] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="history" class="tab-content flex-col p-4 overflow-y-auto pb-24 text-sm">
        <h2 class="font-black text-xl mb-4">היסטוריית הזמנות (Firestore)</h2>
        <div class="bg-white rounded-2xl shadow overflow-hidden border">
            <table class="w-full text-right">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-3">לקוח</th>
                        <th class="p-3">נהג</th>
                        <th class="p-3">מחסן</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg1mkCCOs1A7inc4HfPmTND2t26zbgf9A",
            authDomain: "whatsapp-8ffd1.firebaseapp.com",
            databaseURL: "https://whatsapp-8ffd1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatsapp-8ffd1"
        };
        const GEMINI_KEY = "הכנס_כאן_את_המפתח_העובד"; 
        
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const dbFS = getFirestore(app);

        // פונקציית המוח
        async function askGemini(text) {
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${GEMINI_KEY}`;
                const payload = { contents: [{ parts: [{ text: `אתה נציג ח. סבן 1994. ענה ללקוח בקצרה: ${text}` }] }] };
                const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "נציג אנושי יחזור אליך בהקדם."; }
        }

        // האזנה ל-JONI
        onValue(ref(rtdb, 'saban94/incoming'), async (snap) => {
            const data = snap.val();
            if (data) {
                const id = Object.keys(data).pop();
                const msg = data[id];
                if (!msg.ai_done) {
                    const reply = await askGemini(msg.text);
                    renderMessage(msg.text, 'left');
                    renderMessage(reply, 'right');
                    await push(ref(rtdb, 'saban94/send'), { to: msg.from || "972508860896", text: reply });
                    set(ref(rtdb, `saban94/incoming/${id}/ai_done`), true);
                }
            }
        });

        function renderMessage(text, side) {
            const canvas = document.getElementById('chat-canvas');
            const align = side === 'left' ? 'self-start bg-white' : 'self-end bg-[#dcf8c6]';
            canvas.insertAdjacentHTML('beforeend', `<div class="${align} p-3 rounded-2xl shadow-sm max-w-[85%] text-sm mb-1">${text}</div>`);
            canvas.scrollTop = canvas.scrollHeight;
        }

        // שמירת דוח וסידור
        document.getElementById('sendReportBtn').onclick = async () => {
            const orderData = {
                date: document.getElementById('rep-date').value,
                time: document.getElementById('rep-time').value,
                client: document.getElementById('rep-client').value,
                address: document.getElementById('rep-address').value,
                warehouse: document.getElementById('rep-warehouse').value,
                driver: document.getElementById('rep-driver').value,
                type: document.getElementById('rep-delivery').value,
                timestamp: serverTimestamp()
            };

            // 1. שמירה במאגר דוחות (Firestore)
            await addDoc(collection(dbFS, "orders"), orderData);

            // 2. שליחה לווטסאפ דרך JONI
            const reportText = `*📋 סידור עבודה ח. סבן*\n📅 תאריך: ${orderData.date}\n⏰ שעה: ${orderData.time}\n👤 לקוח: ${orderData.client}\n📍 יעד: ${orderData.address}\n🚚 נהג: ${orderData.driver}\n🏗️ סוג: ${orderData.type}\n📦 מחסן: ${orderData.warehouse}`;
            await push(ref(rtdb, 'saban94/send'), { to: "972508860896", text: reportText });

            alert("הסידור נשמר במאגר ונשלח לנהג! ✅");
        };

        // הצגת היסטוריה בטבלה
        onSnapshot(query(collection(dbFS, "orders"), orderBy("timestamp", "desc"), limit(10)), (snap) => {
            const body = document.getElementById('orders-table-body');
            body.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr class="border-b"><td class="p-3 font-bold">${d.client}</td><td class="p-3">${d.driver}</td><td class="p-3">${d.warehouse}</td></tr>`;
            });
        });

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => {
                b.style.opacity = "0.5";
                b.classList.remove('text-blue-600');
            });
            document.getElementById(id).classList.add('active');
            const btn = document.getElementById('nav-' + id);
            btn.style.opacity = "1";
            btn.classList.add('text-blue-600');
        };

        document.getElementById('rep-date').valueAsDate = new Date();
    </script>
</body>
</html>
