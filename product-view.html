<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ח. סבן 1994 - מפרט מוצר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-white transition-opacity duration-500">
        <div class="flex flex-col items-center gap-4">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold text-slate-400 text-sm italic">בודק מלאי בח. סבן...</p>
        </div>
    </div>

    <main class="max-w-md mx-auto relative">
        <div class="relative h-96 overflow-hidden shadow-xl">
            <div id="product-img" class="w-full h-full bg-slate-200 bg-center bg-cover transition-transform duration-700 hover:scale-110"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-transparent to-transparent"></div>
            <div class="absolute top-6 right-6 px-4 py-1.5 bg-white/20 backdrop-blur-md rounded-full border border-white/30 text-white text-[10px] font-black tracking-widest uppercase italic">
                SABAN 1994
            </div>
        </div>

        <div class="px-6 -mt-12 relative z-10">
            <div class="glass rounded-[40px] p-8 shadow-2xl">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex-1">
                        <h1 id="product-name" class="text-3xl font-black text-slate-900 leading-tight">טוען...</h1>
                        <p id="category" class="text-blue-500 font-bold text-xs mt-1 uppercase tracking-wide">חומרי בניין</p>
                    </div>
                    <div class="text-left">
                        <span class="block text-[10px] text-slate-400 font-bold uppercase leading-none">מחיר שק</span>
                        <div id="price" class="text-3xl font-black text-emerald-600 italic">₪--</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/50 p-4 rounded-3xl border border-slate-100 flex items-center gap-3">
                        <div class="p-2 bg-blue-50 text-blue-500 rounded-xl"><i data-lucide="timer" size="18"></i></div>
                        <div>
                            <span class="block text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">ייבוש</span>
                            <b id="dry-time" class="text-slate-700 text-xs">--</b>
                        </div>
                    </div>
                    <div class="bg-white/50 p-4 rounded-3xl border border-slate-100 flex items-center gap-3">
                        <div class="p-2 bg-emerald-50 text-emerald-500 rounded-xl"><i data-lucide="expand" size="18"></i></div>
                        <div>
                            <span class="block text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">כיסוי</span>
                            <b id="coverage" class="text-slate-700 text-xs">--</b>
                        </div>
                    </div>
                </div>

                <div class="mb-8 p-4 bg-slate-50/50 rounded-2xl border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">מפרט טכני</h3>
                    <p id="description" class="text-slate-600 text-sm leading-relaxed">
                        אנא המתן, שולף נתונים מהמערכת...
                    </p>
                </div>

                <div class="flex items-center gap-3 p-4 bg-slate-900 rounded-3xl text-white shadow-lg">
                    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center animate-pulse">
                        <i data-lucide="check" size="20"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold">מוצר מקורי - זמין במלאי</p>
                        <p class="text-[9px] text-slate-400 leading-none tracking-tight">הספקה מהירה לסניף או אתר הלקוח</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-50 max-w-md mx-auto">
        <div class="glass rounded-3xl p-3 flex gap-3 shadow-2xl">
            <button onclick="window.history.back()" class="w-14 h-14 flex items-center justify-center bg-slate-100 rounded-2xl text-slate-600 hover:bg-slate-200 transition-colors">
                <i data-lucide="arrow-right"></i>
            </button>
            <a id="whatsapp-btn" href="#" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-emerald-600/20 active:scale-95 transition-all">
                ביצוע הזמנה מהירה
                <i data-lucide="send" size="18"></i>
            </a>
        </div>
    </div>

    <script>
        // רמי - תעדכן כאן את המפתחות שלך מ-Supabase Settings -> API
        const SB_URL = 'https://sqslrnbduxtxsvwqryxq.supabase.co'; 
        const SB_KEY = 'sb_publishable_jnuD4Nfa2hMMlv6Se5sPIQ_l791aOLU';

        async function init() {
            lucide.createIcons();
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id'); // זה ה-SKU שמגיע מהגימני

            if (!productId) {
                document.getElementById('product-name').innerText = "מוצר לא צוין";
                document.getElementById('loader').style.display = 'none';
                return;
            }

            try {
                // שינוי לחיפוש לפי עמודת sku כפי שמופיע ב-CSV שלך
                const res = await fetch(`${SB_URL}/rest/v1/inventory?sku=eq.${productId}&select=*`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });

                if (!res.ok) throw new Error("שגיאת חיבור למסד הנתונים");

                const data = await res.json();
                const p = data[0];

                if (p) {
                    document.getElementById('product-name').innerText = p.product_name;
                    document.getElementById('price').innerText = p.price > 0 ? `₪${p.price}` : 'פנה לנציג';
                    document.getElementById('description').innerText = p.description || 'אין מפרט זמין';
                    document.getElementById('dry-time').innerText = p.drying_time || 'לפי יצרן';
                    document.getElementById('coverage').innerText = p.coverage || 'לפי שטח';
                    document.getElementById('category').innerText = p.category || 'חומרי בניין';
                    document.getElementById('product-img').style.backgroundImage = `url('${p.image_url || 'https://via.placeholder.com/600'}')`;
                    
                    const msg = encodeURIComponent(`היי ח. סבן, אני מעוניין ב-${p.product_name} (מק"ט: ${p.sku})`);
                    document.getElementById('whatsapp-btn').href = `https://wa.me/972508860896?text=${msg}`;
                } else {
                    document.getElementById('product-name').innerText = "לא נמצא מוצר במלאי";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('product-name').innerText = "שגיאה בטעינה";
            } finally {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        }

        init();
    </script>
</body>
</html>
