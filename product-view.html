<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>פרטי מוצר - ח. סבן</title>
</head>
<body class="bg-slate-50 font-sans p-4">
    <div class="max-w-md mx-auto bg-white rounded-[32px] shadow-2xl overflow-hidden border border-slate-100">
        <div id="productImg" class="h-64 bg-slate-200 bg-center bg-cover"></div>
        <div class="p-8">
            <div class="flex justify-between items-start mb-4">
                <h1 id="title" class="text-3xl font-black text-slate-900">טוען...</h1>
                <span id="price" class="text-2xl font-black text-emerald-600">₪--</span>
            </div>
            <p id="desc" class="text-slate-500 leading-relaxed mb-8">אנא המתן בזמן שאנו שולפים את המפרט הטכני מהמחסן...</p>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-blue-50 p-4 rounded-2xl text-center">
                    <span class="block text-[10px] font-bold text-blue-400 uppercase">זמן ייבוש</span>
                    <b id="dryTime" class="text-blue-700">--</b>
                </div>
                <div class="bg-emerald-50 p-4 rounded-2xl text-center">
                    <span class="block text-[10px] font-bold text-emerald-400 uppercase">כיסוי</span>
                    <b id="coverage" class="text-emerald-700">--</b>
                </div>
            </div>

            <a href="https://wa.me/972508860896?text=אני_רוצה_להזמין" 
               class="block w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-center shadow-xl active:scale-95 transition-all">
                בצע הזמנה עכשיו 🚀
            </a>
        </div>
    </div>

    <script>
        // לוגיקה לשליפת נתונים מהלינק
        const params = new URLSearchParams(window.location.search);
        document.getElementById('title').innerText = params.get('name') || 'מוצר כללי';
        document.getElementById('price').innerText = '₪' + (params.get('price') || '0');
        document.getElementById('desc').innerText = params.get('desc') || 'מפרט טכני מלא מחכה לך כאן.';
        document.getElementById('dryTime').innerText = params.get('dry') || '24 שעות';
        document.getElementById('coverage').innerText = params.get('cov') || '4.5 ק"ג';
        document.getElementById('productImg').style.backgroundImage = `url('${params.get('img') || 'https://via.placeholder.com/400'}')`;
    </script>
</body>
</html>
