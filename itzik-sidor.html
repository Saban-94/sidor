<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>איציק זהבי | ח. סבן - סידור</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { --accent: #33ccff; }
        body { transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        .itzik-gradient { background: linear-gradient(135deg, #33ccff 0%, #0066ff 100%); }
        
        /* סגנון זיקית - התאמה למחשב vs נייד */
        @media (min-width: 1024px) {
            .chat-container { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; }
            .history-sidebar { display: block !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">

    <header class="glass sticky top-0 z-50 p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <div class="relative">
                <img id="profile-img" src="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/138846705_247951546693089_6505800604178808158_n.jpg?stp=dst-jpg_s96x96_tt6&ccb=11-4&oh=01_Q5Aa3wGXVV3pgMd3z7McTCHzCw4KlUI_PC40S4aMmH6BmUb3pQ&oe=69B7D890&_nc_sid=5e03e0&_nc_cat=105" 
                     class="w-12 h-12 rounded-full border-2 border-blue-400 shadow-blue-500/50 shadow-md">
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight">איציק זהבי</h1>
                <p id="device-status" class="text-[10px] opacity-60">מזהה מכשיר...</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:scale-110 transition-transform">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
            <button class="lg:hidden w-10 h-10 rounded-xl glass flex items-center justify-center">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="chat-container max-w-7xl mx-auto h-[calc(100vh-160px)]">
        <aside class="history-sidebar hidden lg:flex flex-col glass rounded-3xl p-4 overflow-y-auto">
            <h3 class="font-bold text-sm mb-4 opacity-50 uppercase tracking-widest">היסטוריית פניות איציק</h3>
            <div id="firebase-history" class="space-y-3">
                </div>
        </aside>

        <section class="flex flex-col h-full glass rounded-3xl overflow-hidden relative">
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4">
                <div class="flex justify-start">
                    <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-lg">
                        היי איציק, אני מזהה שאתה מחובר מה-<b><span id="device-name"></span></b>. איך מתקדמים עם הסידור של רמי היום?
                    </div>
                </div>
            </div>

            <div class="p-4 bg-transparent border-t border-white/10">
                <div class="flex gap-2">
                    <input type="text" id="userInput" onkeydown="handleKey(event)"
                           placeholder="כתוב הודעה או הקלט..."
                           class="flex-1 bg-white/10 border border-white/20 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="sendBtn" class="itzik-gradient w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 active:scale-90 transition-all">
                        <i class="fas fa-paper-plane text-white text-xl"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // לוגיקת נושא (Light/Dark)
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fas fa-sun';
            } else {
                html.classList.add('dark');
                icon.className = 'fas fa-moon';
            }
        }

        // זיהוי מכשיר ואירועים (זיקית)
        function detectDevice() {
            const ua = navigator.userAgent;
            const deviceName = /mobile/i.test(ua) ? "סלולרי (PWA)" : "מחשב שולחני (Desktop)";
            document.getElementById('device-status').innerText = `מחובר מ: ${deviceName}`;
            document.getElementById('device-name').innerText = deviceName;
            
            // רישום אירוע כניסה ל-Firebase
            console.log("אירוע כניסה הוקלט: itzik_history");
        }

        // ניהול אירועי מקלדת ועכבר
        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // אירוע מגע/לחיצה
        document.getElementById('sendBtn').addEventListener('touchstart', (e) => {
            console.log("אירוע מגע זוהה - איציק בשטח");
        });

        window.onload = detectDevice;
    </script>
</body>
</html>
