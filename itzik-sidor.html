<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איציק זהבי | מוח לוגיסטי ח. סבן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .whatsapp-bg { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .ai-brain { background: radial-gradient(circle, #1e293b 0%, #020617 100%); height: 120px; border-radius: 20px; position: relative; overflow: hidden; }
        .pulse { position: absolute; border: 2px solid #33ccff; border-radius: 50%; animation: pulse-anim 3s infinite; opacity: 0; }
        @keyframes pulse-anim { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="bg-[#020617] text-white h-screen flex flex-col font-sans">

    <div class="p-3">
        <div class="ai-brain flex flex-col items-center justify-center border border-blue-500/30 shadow-[0_0_20px_rgba(51,204,255,0.1)]">
            <div class="pulse w-24 h-24"></div>
            <h2 class="text-blue-400 font-black tracking-tighter z-10">AI - ח.סבן הארגון</h2>
            <div id="status" class="text-[10px] text-blue-300/60 mt-1 animate-pulse z-10">🧠 מסנכרן היסטוריה מ-Firebase...</div>
        </div>
    </div>

    <header class="bg-[#202c33] p-3 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <img src="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/138846705_247951546693089_6505800604178808158_n.jpg?stp=dst-jpg_s96x96_tt6&ccb=11-4&oh=01_Q5Aa3wGXVV3pgMd3z7McTCHzCw4KlUI_PC40S4aMmH6BmUb3pQ&oe=69B7D890&_nc_sid=5e03e0&_nc_cat=105" 
                 class="w-10 h-10 rounded-full border-2 border-[#25d366]">
            <div>
                <h1 class="text-sm font-bold">איציק זהבי (החרש 10)</h1>
                <p id="device-info" class="text-[9px] text-[#25d366]">מזהה מכשיר...</p>
            </div>
        </div>
        <div class="flex gap-4 text-slate-400 text-sm">
            <i class="fas fa-moon cursor-pointer" onclick="toggleTheme()"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <main id="chat-box" class="flex-1 whatsapp-bg overflow-y-auto p-4 space-y-3 text-sm">
        </main>

    <div class="p-3 flex gap-2">
        <button onclick="sendQuick('העברה בין סניפים')" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-all">📦 העברה</button>
        <button onclick="sendQuick('הובלה ללקוח')" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition-all">🏗️ הובלה</button>
    </div>

    <footer class="bg-[#202c33] p-3 flex items-center gap-2">
        <input type="text" id="msg-input" placeholder="הקלד הודעה לסידור..." 
               class="flex-1 bg-[#2a3942] rounded-xl p-3 text-sm outline-none border border-white/5">
        <button onclick="handleSend()" class="bg-[#00a884] w-10 h-10 rounded-full flex items-center justify-center shadow-md">
            <i class="fas fa-paper-plane text-white text-sm"></i>
        </button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
