<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איציק זהבי - ניהול סידור סניף החרש</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .itzik-avatar { border: 3px solid #33ccff; box-shadow: 0 0 15px rgba(51, 204, 255, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col">

    <header class="glass p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="https://media-mrs2-2.cdn.whatsapp.net/v/t61.24694-24/138846705_247951546693089_6505800604178808158_n.jpg?stp=dst-jpg_s96x96_tt6&ccb=11-4&oh=01_Q5Aa3wGXVV3pgMd3z7McTCHzCw4KlUI_PC40S4aMmH6BmUb3pQ&oe=69B7D890&_nc_sid=5e03e0&_nc_cat=105" 
                 alt="איציק זהבי" class="w-12 h-12 rounded-full itzik-avatar">
            <div>
                <h1 class="font-black text-lg text-blue-400">איציק זהבי</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">מנהל סניף החרש 10</p>
            </div>
        </div>
        <div class="flex gap-2">
            <div class="bg-blue-500/10 text-blue-400 text-[10px] px-2 py-1 rounded-md border border-blue-500/20">מחובר לרמי</div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 p-4 space-y-4 overflow-y-auto pb-32">
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 text-sm italic text-slate-400">
            <i class="fas fa-history ml-2"></i> טוען היסטוריית העברות אחרונה...
        </div>
    </main>

    <footer class="glass border-t border-slate-800 p-4 fixed bottom-0 w-full">
        <div class="max-w-4xl mx-auto space-y-3">
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="quickAction('העברה דחופה מהתלמוד')" class="bg-slate-800 text-[11px] px-3 py-2 rounded-full border border-slate-700 whitespace-nowrap">📦 העברה דחופה</button>
                <button onclick="quickAction('הזמנה חדשה ללקוח')" class="bg-slate-800 text-[11px] px-3 py-2 rounded-full border border-slate-700 whitespace-nowrap">🏗️ הובלה ללקוח</button>
                <button onclick="quickAction('איפה עלי המשאית?')" class="bg-slate-800 text-[11px] px-3 py-2 rounded-full border border-slate-700 whitespace-nowrap">🚚 איפה עלי?</button>
            </div>
            <div class="relative">
                <input type="text" id="userInput" placeholder="איציק, מה לשלוח לרמי?" 
                       class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4 pr-12 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button class="absolute left-3 top-1/2 -translate-y-1/2 bg-blue-600 p-2 rounded-xl">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        function quickAction(text) {
            document.getElementById('userInput').value = text;
        }
        // כאן יבוא הקוד לחיבור ל-API של ה-Sidor ב-GitHub
    </script>
</body>
</html>
